<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>KPM | Premium Responsive Portal</title>
    <style>
        :root {
            --primary: #FF0032;
            --bg: #050505;
            --card-bg: #121212;
            --text: #ffffff;
            --text-dim: #888;
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; outline: none; }
        
        body {
            font-family: -apple-system, system-ui, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background: var(--bg);
            color: var(--text);
            margin: 0;
            padding: 0;
            user-select: none;
            overflow-x: hidden;
        }

        /* Responsive Header */
        header {
            background: rgba(18, 18, 18, 0.98);
            backdrop-filter: blur(10px);
            padding: 10px;
            position: sticky;
            top: 0;
            z-index: 1000;
            border-bottom: 1px solid #222;
        }

        .history-stack {
            font-size: 9px;
            color: var(--primary);
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 8px;
            font-weight: bold;
            white-space: nowrap;
        }

        .controls {
            display: flex;
            gap: 5px;
            flex-wrap: nowrap;
            align-items: center;
        }

        input, button {
            background: #1e1e1e;
            border: 1px solid #333;
            color: white;
            padding: 8px 10px;
            border-radius: 6px;
            font-size: 13px;
        }

        #search-input { flex: 1; min-width: 50px; }

        .btn-main {
            background: var(--primary);
            border: none;
            font-weight: bold;
            cursor: pointer;
            transition: 0.1s;
        }

        .btn-main:active { transform: scale(0.95); }

        /* Adaptive Grid */
        .content-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 10px;
            padding: 10px;
            max-width: 1200px;
            margin: 0 auto;
        }

        /* 250px - 350px scaling */
        @media (max-width: 250px) {
            .content-grid { grid-template-columns: 1fr; }
            .btn-main { padding: 8px 5px; font-size: 11px; }
        }

        .card {
            background: var(--card-bg);
            border-radius: 10px;
            overflow: hidden;
            border: 1px solid #222;
            cursor: pointer;
            display: flex;
            flex-direction: column;
        }

        .thumb-container { width: 100%; aspect-ratio: 16/9; background: #000; overflow: hidden; }
        .thumb-container img { width: 100%; height: 100%; object-fit: cover; }
        
        .card-info { padding: 8px; flex-grow: 1; display: flex; flex-direction: column; justify-content: space-between; }
        .card-title {
            font-size: 12px;
            font-weight: 500;
            line-height: 1.3;
            height: 32px;
            overflow: hidden;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            margin-bottom: 5px;
        }

        .meta-timestamp { font-size: 9px; color: var(--text-dim); display: flex; justify-content: space-between; }

        /* Sub Post Page */
        #post-detail-view {
            display: none;
            position: fixed;
            inset: 0;
            background: var(--bg);
            z-index: 2000;
            overflow-y: auto;
            padding: 10px;
        }

        .detail-container { max-width: 800px; margin: 0 auto; }

        .post-meta-content {
            background: var(--card-bg);
            padding: 15px;
            border-radius: 10px;
            border: 1px solid #222;
            margin: 10px 0;
        }

        .post-meta-content h1 { font-size: 1.2rem; color: var(--primary); margin: 0 0 10px 0; }
        
        .full-meta { font-size: 11px; color: var(--text-dim); margin-bottom: 15px; display: flex; gap: 15px; }

        /* Media Gallery */
        .image-gallery { display: flex; flex-direction: column; gap: 10px; margin: 15px 0; }
        .image-gallery img { width: 100%; border-radius: 8px; border: 1px solid #333; height: auto; }

        .video-box { width: 100%; background: #000; border-radius: 10px; overflow: hidden; border: 1px solid #222; margin-top: 15px; }
        .extract-screen { padding: 40px 10px; text-align: center; }
        video { width: 100%; display: block; }

        /* Pagination */
        .pagination { display: flex; justify-content: center; align-items: center; gap: 8px; padding: 15px 10px; }
        .pg-num { width: 45px; text-align: center; border: 1px solid var(--primary); background: #000; }

        .hidden { display: none !important; }
    </style>
</head>
<body oncontextmenu="return false;">

<header id="main-header">
    <div class="history-stack" id="stack-ui">HOME</div>
    <div class="controls">
        <button class="btn-main" onclick="nav.toHome()">HOME</button>
        <button class="btn-main" onclick="nav.toCategories()">CATS</button>
        <input type="search" id="search-input" placeholder="Search movies...">
        <button class="btn-main" onclick="nav.doSearch()">GO</button>
    </div>
</header>

<div id="list-view">
    <div class="pagination" id="pag-top"></div>
    <main class="content-grid" id="display-engine"></main>
    <div class="pagination" id="pag-bottom"></div>
</div>

<div id="post-detail-view">
    <div class="detail-container">
        <button class="btn-main" onclick="nav.back()">← BACK</button>
        
        <div class="post-meta-content">
            <h1 id="post-title"></h1>
            <div class="full-meta">
                <span id="post-date"></span>
                <span id="post-time"></span>
            </div>

            <div id="post-gallery" class="image-gallery"></div>
            <div id="post-body" style="font-size: 14px; color: #ccc; line-height: 1.5;"></div>

            <div class="video-box">
                <div id="extract-screen" class="extract-screen">
                    <button class="btn-main" id="btn-extract" style="padding: 15px 25px;">EXTRACT REAL VIDEO LINK</button>
                </div>
                <div id="video-wrap" class="hidden">
                    <video id="html5-player" controls playsinline></video>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
const _API = "https://koreanpornmovie.com/wp-json/wp/v2";
let state = { view: 'latest', page: 1, total: 1, catId: null, history: ['HOME'], currentPosts: [] };

// Extracts all unique JPG/PNG sources from post HTML
function scrapeImages(post) {
    const images = [];
    // 1. Add featured media if exists
    if(post._embedded?.['wp:featuredmedia']?.[0]?.source_url) {
        images.push(post._embedded['wp:featuredmedia'][0].source_url);
    }
    // 2. Add all images found in content
    const temp = document.createElement('div');
    temp.innerHTML = post.content.rendered;
    temp.querySelectorAll('img').forEach(img => {
        if(!images.includes(img.src)) images.push(img.src);
    });
    return images;
}

const nav = {
    update: (ns) => { state = {...state, ...ns}; history.pushState(state, ''); sync(); },
    back: () => history.back(),
    toHome: () => nav.update({view:'latest', page:1, history:['HOME']}),
    toCategories: () => nav.update({view:'categories', page:1, history:['HOME','CATEGORIES']}),
    doSearch: () => {
        const q = document.getElementById('search-input').value;
        if(q) nav.update({view:'search', query:q, page:1, history:['HOME', 'SEARCH: '+q]});
    },
    openPost: (id) => {
        const p = state.currentPosts.find(x => x.id === id);
        if(!p) return;

        // UI Setup
        document.getElementById('post-title').innerHTML = p.title.rendered;
        const d = new Date(p.date);
        document.getElementById('post-date').innerText = "📅 " + d.toLocaleDateString();
        document.getElementById('post-time').innerText = "🕒 " + d.toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'});
        document.getElementById('post-body').innerHTML = p.excerpt.rendered;

        // Gallery Rendering
        const imgs = scrapeImages(p);
        document.getElementById('post-gallery').innerHTML = imgs.map(src => `<img src="${src}" alt="media">`).join('');
        
        // Video/Player Logic
        const player = document.getElementById('html5-player');
        player.pause(); player.src = "";
        document.getElementById('extract-screen').classList.remove('hidden');
        document.getElementById('video-wrap').classList.add('hidden');
        
        document.getElementById('btn-extract').onclick = () => {
            // Simulated extraction logic
            player.src = "https://koreanporn.stream/Married%20Woman%20Secretly%20Getting%20A%20Finishing%20Inside%20(2025).mp4";
            document.getElementById('extract-screen').classList.add('hidden');
            document.getElementById('video-wrap').classList.remove('hidden');
            player.play();
        };

        nav.update({view: 'post_single'});
    }
};

function sync() {
    const isSingle = state.view === 'post_single';
    document.getElementById('list-view').style.display = isSingle ? 'none' : 'block';
    document.getElementById('main-header').style.display = isSingle ? 'none' : 'block';
    document.getElementById('post-detail-view').style.display = isSingle ? 'block' : 'none';
    document.getElementById('stack-ui').innerText = state.history.join(' > ');
    if(!isSingle) render();
    window.scrollTo(0,0);
}

window.onpopstate = (e) => { if(e.state) { state = e.state; sync(); } };

async function render() {
    const grid = document.getElementById('display-engine');
    grid.innerHTML = '<div style="grid-column:1/-1; text-align:center; padding:50px; font-size:12px;">FAST LOADING...</div>';

    if (state.view === 'categories') {
        const res = await fetch(`${_API}/categories?per_page=50&hide_empty=true`);
        const cats = await res.json();
        
        const catCards = await Promise.all(cats.map(async c => {
            const pRes = await fetch(`${_API}/posts?categories=${c.id}&per_page=1&_embed`);
            const pData = await pRes.json();
            const img = pData[0]?._embedded?.['wp:featuredmedia']?.[0]?.source_url || '';
            return `
                <div class="card" onclick="nav.update({view:'cat_posts', catId:${c.id}, history:['HOME', '${c.name}'], page:1})">
                    <div class="thumb-container"><img src="${img}"></div>
                    <div class="card-info" style="text-align:center;">
                        <div style="font-weight:bold; color:var(--primary); font-size:11px; text-transform:uppercase;">${c.name}</div>
                        <div style="font-size:9px; color:var(--text-dim);">${c.count} VIDEOS</div>
                    </div>
                </div>`;
        }));
        grid.innerHTML = catCards.join('');
        document.getElementById('pag-top').innerHTML = '';
        document.getElementById('pag-bottom').innerHTML = '';
    } else {
        let url = `${_API}/posts?per_page=16&page=${state.page}&_embed`;
        if (state.view === 'cat_posts') url += `&categories=${state.catId}`;
        if (state.view === 'search') url += `&search=${state.query}`;

        const res = await fetch(url);
        state.total = parseInt(res.headers.get('X-WP-TotalPages')) || 1;
        state.currentPosts = await res.json();

        grid.innerHTML = state.currentPosts.map(p => {
            const d = new Date(p.date);
            const dateStr = d.toLocaleDateString();
            const timeStr = d.toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'});
            return `
                <div class="card" onclick="nav.openPost(${p.id})">
                    <div class="thumb-container">
                        <img src="${p._embedded?.['wp:featuredmedia']?.[0]?.source_url || ''}">
                    </div>
                    <div class="card-info">
                        <div class="card-title">${p.title.rendered}</div>
                        <div class="meta-timestamp">
                            <span>📅 ${dateStr}</span>
                            <span>🕒 ${timeStr}</span>
                        </div>
                    </div>
                </div>`;
        }).join('');
        renderPagination();
    }
}

function renderPagination() {
    const html = `
        <button class="btn-main" onclick="state.page--; render();" ${state.page <= 1 ? 'disabled' : ''}>PREV</button>
        <span style="font-size:11px">${state.page} / ${state.total}</span>
        <button class="btn-main" onclick="state.page++; render();" ${state.page >= state.total ? 'disabled' : ''}>NEXT</button>
    `;
    document.getElementById('pag-top').innerHTML = html;
    document.getElementById('pag-bottom').innerHTML = html;
}

sync();
</script>
</body>
</html>
