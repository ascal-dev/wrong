<!DOCTYPE html>
<html>

<head>

<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Streaming Library</title>

<style>

body{
margin:0;
font-family:Arial;
background:#0b0b0b;
color:white;
}

header{
background:black;
padding:15px;
text-align:center;
font-size:22px;
}

.menu{
display:flex;
flex-wrap:wrap;
gap:10px;
padding:10px;
justify-content:center;
background:#111;
}

.menu button{
padding:8px 14px;
background:#e50914;
border:none;
color:white;
border-radius:4px;
cursor:pointer;
}

.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(180px,1fr));
gap:15px;
padding:15px;
}

.card{
background:#1a1a1a;
border-radius:10px;
overflow:hidden;
cursor:pointer;
}

.card img{
width:100%;
height:250px;
object-fit:cover;
}

.card h3{
font-size:15px;
padding:10px;
}

#postPage{
display:none;
padding:20px;
max-width:900px;
margin:auto;
}

.poster{
width:100%;
max-width:500px;
display:block;
margin:auto;
}

.playerBox{
margin-top:20px;
background:black;
padding:10px;
border-radius:10px;
}

video{
width:100%;
max-height:500px;
background:black;
}

.playbtn{
margin-top:10px;
padding:8px 15px;
background:#e50914;
border:none;
color:white;
cursor:pointer;
}

.extractbtn{
background:#2196F3;
margin-left:10px;
}

.linkBox{
background:#1a1a1a;
padding:10px;
margin-top:10px;
border-radius:6px;
}

</style>

</head>

<body>

<header>Streaming Library</header>

<div class="menu">

<button onclick="loadLatest()">Latest</button>

<div id="categories"></div>

</div>

<div id="posts" class="grid"></div>

<div id="postPage"></div>

<script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>

<script>

const API="https://ddose007.info.in/wp-json/wp/v2"
const PROXY="https://allinone.godess.workers.dev/?url="

let currentSources=[]
let hlsInstance=null

console.log("APP STARTED")

loadCategories()
loadLatest()

/* ---------------- PROXY FETCH ---------------- */

async function proxyFetch(url){

console.log("Proxy fetch:",url)

let res=await fetch(PROXY+encodeURIComponent(url))

let text=await res.text()

return text

}

/* ---------------- REDIRECT FOLLOWER ---------------- */

async function followRedirect(url){

console.log("Redirect start:",url)

let final=url

for(let i=0;i<6;i++){

let r=await fetch(PROXY+encodeURIComponent(final),{
redirect:"follow"
})

console.log("Redirect step",i,"->",r.url)

if(r.url===final) break

final=r.url

}

console.log("Final stream:",final)

return final

}

/* ---------------- CATEGORIES ---------------- */

async function loadCategories(){

let res=await fetch(API+"/categories")
let data=await res.json()

let html=""

data.forEach(c=>{
html+=`<button onclick="loadPosts(${c.id})">${c.name}</button>`
})

document.getElementById("categories").innerHTML=html

}

/* ---------------- POSTS ---------------- */

async function loadLatest(){

let res=await fetch(API+"/posts?_embed&per_page=12")
let posts=await res.json()

renderPosts(posts)

}

async function loadPosts(id){

let res=await fetch(API+"/posts?categories="+id+"&_embed")
let posts=await res.json()

renderPosts(posts)

}

function renderPosts(posts){

document.getElementById("postPage").style.display="none"
document.getElementById("posts").style.display="grid"

let html=""

posts.forEach(p=>{

let img=""

if(p._embedded && p._embedded["wp:featuredmedia"]){
img=p._embedded["wp:featuredmedia"][0].source_url
}

html+=`

<div class="card" onclick="openPost(${p.id})">

<img src="${img}">
<h3>${p.title.rendered}</h3>

</div>

`

})

document.getElementById("posts").innerHTML=html

}

/* ---------------- OPEN POST ---------------- */

async function openPost(id){

let res=await fetch(API+"/posts/"+id+"?_embed")
let post=await res.json()

let img=""

if(post._embedded && post._embedded["wp:featuredmedia"]){
img=post._embedded["wp:featuredmedia"][0].source_url
}

document.getElementById("posts").style.display="none"
document.getElementById("postPage").style.display="block"

let content=post.content.rendered

let links=extractLinks(content)

let linkHTML=""

links.forEach(l=>{

if(isDownloadHost(l)) return

linkHTML+=`

<div class="linkBox">

${l}

<button class="extractbtn" onclick="extractStream('${l}')">
Extract
</button>

</div>

`

})

document.getElementById("postPage").innerHTML=`

<button onclick="back()">Back</button>

<img class="poster" src="${img}">

<h2>${post.title.rendered}</h2>

<div class="playerBox">

<video id="player" controls></video>

<div id="qualityBox"></div>

</div>

<h3>Links</h3>

${linkHTML}

`

}

/* ---------------- LINK SCAN ---------------- */

function extractLinks(html){

let urls=new Set()

let regex=/(https?:\/\/[^"'<> ]+)/g
let match

while((match=regex.exec(html))!==null){

let url=match[1]

if(!isDownloadHost(url)){
urls.add(url)
}

}

console.log("Links found:",[...urls])

return [...urls]

}

/* ---------------- DOWNLOAD HOST FILTER ---------------- */

function isDownloadHost(url){

let blocked=[
"upfileas",
"uploadmall",
"dropgalaxy",
"freedl"
]

return blocked.some(h=>url.includes(h))

}

/* ---------------- STREAM EXTRACTION ---------------- */

async function extractStream(link){

console.log("Extracting:",link)

let html=await proxyFetch(link)

/* JWPLAYER HOSTS */

if(link.includes("vidnest") || link.includes("lulu") || link.includes("luluvdoo")){
extractJW(html)
return
}

/* STRCLOUD FAMILY */

if(link.includes("strcloud") || link.includes("advertape") || link.includes("tapeadsenjoyer")){
extractStrcloud(html)
return
}

console.log("Host not supported")

}

/* ---------------- JWPLAYER PARSER ---------------- */

function extractJW(html){

console.log("JW parser")

let fileRegex=/file\s*:\s*"([^"]+)"/g
let labelRegex=/label\s*:\s*"([^"]+)"/g

let files=[...html.matchAll(fileRegex)]
let labels=[...html.matchAll(labelRegex)]

currentSources=[]

for(let i=0;i<files.length;i++){

currentSources.push({
file:files[i][1],
label:labels[i] ? labels[i][1] : "auto"
})

}

console.log("Sources:",currentSources)

if(currentSources.length>0){

renderQualityButtons()
playStream(currentSources[0].file)

}

}

/* ---------------- STRCLOUD PARSER ---------------- */

async function extractStrcloud(html){

console.log("Strcloud extractor")

let match=html.match(/id="(?:ideoooolink|captchalink|norobotlink)"[^>]*>(.*?)</)

if(!match){
console.log("No redirect found")
return
}

let url=match[1]

url=url.replace(/&amp;/g,"&")

if(url.startsWith("//")) url="https:"+url
if(url.startsWith("/")) url="https:"+url

console.log("Extracted redirect:",url)

let final=await followRedirect(url)

playStream(final)

}

/* ---------------- PLAYER ---------------- */

function playStream(url){

console.log("Playing:",url)

let player=document.getElementById("player")

if(hlsInstance){
hlsInstance.destroy()
hlsInstance=null
}

if(url.includes(".m3u8")){

if(Hls.isSupported()){

hlsInstance=new Hls()

hlsInstance.loadSource(url)

hlsInstance.attachMedia(player)

}else{

player.src=url

}

}else{

player.src=url

}

player.play()

}

/* ---------------- QUALITY BUTTONS ---------------- */

function renderQualityButtons(){

let html=""

currentSources.forEach(s=>{
html+=`<button class="playbtn" onclick="playStream('${s.file}')">${s.label}</button>`
})

document.getElementById("qualityBox").innerHTML=html

}

/* ---------------- BACK ---------------- */

function back(){

document.getElementById("postPage").style.display="none"
document.getElementById("posts").style.display="grid"

}

</script>

</body>

</html>
