<!DOCTYPE html>
<html>

<head>

<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Streaming Library</title>

<style>

body{
margin:0;
font-family:Arial;
background:#0b0b0b;
color:white;
}

header{
background:black;
padding:15px;
text-align:center;
font-size:22px;
}

.menu{
display:flex;
flex-wrap:wrap;
gap:10px;
padding:10px;
justify-content:center;
background:#111;
}

.menu button{
padding:8px 14px;
background:#e50914;
border:none;
color:white;
border-radius:4px;
cursor:pointer;
}

.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(180px,1fr));
gap:15px;
padding:15px;
}

.card{
background:#1a1a1a;
border-radius:10px;
overflow:hidden;
cursor:pointer;
}

.card img{
width:100%;
height:250px;
object-fit:cover;
}

.card h3{
font-size:15px;
padding:10px;
}

#postPage{
display:none;
padding:20px;
max-width:900px;
margin:auto;
}

.poster{
width:100%;
max-width:500px;
display:block;
margin:auto;
}

.playerBox{
margin-top:20px;
background:black;
padding:10px;
border-radius:10px;
}

video{
width:100%;
max-height:500px;
background:black;
}

.playbtn{
margin-top:10px;
padding:8px 15px;
background:#e50914;
border:none;
color:white;
cursor:pointer;
}

.extractbtn{
background:#2196F3;
margin-left:10px;
}

.linkBox{
background:#1a1a1a;
padding:10px;
margin-top:10px;
border-radius:6px;
}

</style>

</head>

<body>

<header>Streaming Library</header>

<div class="menu">

<button onclick="loadLatest()">Latest</button>

<div id="categories"></div>

</div>

<div id="posts" class="grid"></div>

<div id="postPage"></div>

<script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>

<script>

const API="https://ddose007.info.in/wp-json/wp/v2"
const PROXY="https://allinone.godess.workers.dev/?url="

let currentSources=[]
let hlsInstance=null

loadCategories()
loadLatest()

/* ---------------- PROXY FETCH ---------------- */

async function proxyFetch(url){
let res=await fetch(PROXY+encodeURIComponent(url))
return await res.text()
}

/* ---------------- REDIRECT FOLLOWER ---------------- */

async function followRedirect(url){

let final=url

for(let i=0;i<6;i++){

let r=await fetch(PROXY+encodeURIComponent(final),{
redirect:"follow"
})

if(r.url===final) break
final=r.url

}

return final

}

/* ---------------- CATEGORIES ---------------- */

async function loadCategories(){

let res=await fetch(API+"/categories")
let data=await res.json()

let html=""

data.forEach(c=>{
html+=`<button onclick="loadPosts(${c.id})">${c.name}</button>`
})

document.getElementById("categories").innerHTML=html

}

/* ---------------- POSTS ---------------- */

async function loadLatest(){

let res=await fetch(API+"/posts?_embed&per_page=12")
let posts=await res.json()

renderPosts(posts)

}

async function loadPosts(id){

let res=await fetch(API+"/posts?categories="+id+"&_embed")
let posts=await res.json()

renderPosts(posts)

}

function renderPosts(posts){

document.getElementById("postPage").style.display="none"
document.getElementById("posts").style.display="grid"

let html=""

posts.forEach(p=>{

let img=""

if(p._embedded && p._embedded["wp:featuredmedia"]){
img=p._embedded["wp:featuredmedia"][0].source_url
}

html+=`

<div class="card" onclick="openPost(${p.id})">
<img src="${img}">
<h3>${p.title.rendered}</h3>
</div>

`

})

document.getElementById("posts").innerHTML=html

}

/* ---------------- OPEN POST ---------------- */

async function openPost(id){

let res=await fetch(API+"/posts/"+id+"?_embed")
let post=await res.json()

let img=""

if(post._embedded && post._embedded["wp:featuredmedia"]){
img=post._embedded["wp:featuredmedia"][0].source_url
}

document.getElementById("posts").style.display="none"
document.getElementById("postPage").style.display="block"

let content=post.content.rendered

let links=extractLinks(content)

let linkHTML=""

links.forEach(l=>{

if(isDownloadHost(l)) return

linkHTML+=`

<div class="linkBox">
${l}
<button class="extractbtn" onclick="extractStream('${l}')">
Extract
</button>
</div>

`

})

document.getElementById("postPage").innerHTML=`

<button onclick="back()">Back</button>

<img class="poster" src="${img}">

<h2>${post.title.rendered}</h2>

<div class="playerBox">
<video id="player" controls></video>
<div id="qualityBox"></div>
</div>

<h3>Links</h3>

${linkHTML}

`

}

/* ---------------- LINK SCAN ---------------- */

function extractLinks(html){

let urls=new Set()
let regex=/(https?:\/\/[^"'<> ]+)/g
let match

while((match=regex.exec(html))!==null){

let url=match[1]

if(!isDownloadHost(url)){
urls.add(url)
}

}

return [...urls]

}

/* ---------------- DOWNLOAD HOST FILTER ---------------- */

function isDownloadHost(url){

let blocked=[
"upfileas",
"uploadmall",
"dropgalaxy",
"freedl"
]

return blocked.some(h=>url.includes(h))

}

/* ---------------- STREAM EXTRACTION ---------------- */

async function extractStream(link){

let html=await proxyFetch(link)

/* JWPLAYER HOSTS */
if(link.includes("vidnest") || link.includes("lulu") || link.includes("luluvdoo")){
extractJW(html)
return
}

/* STRCLOUD */
if(link.includes("strcloud") || link.includes("advertape") || link.includes("tapeadsenjoyer")){
extractStrcloud(html)
return
}

// ✅ BOODSTREAM SUPPORT
if(link.includes("boodstream.cc")){
console.log("➡️ Using BOODSTREAM extractor")
extractBoodstream(link)
return
}

}


async function extractBoodstream(link){

console.log("🎯 BOODSTREAM LINK:", link)

// extract videoId
let match = link.match(/boodstream\.cc\/([A-Z0-9]+)/i)

if(!match){
console.log("❌ Invalid boodstream link")
return
}

const videoId = match[1]
console.log("🆔 videoId:", videoId)

const reqId = crypto.randomUUID()
const time = Date.now().toString()
const userStr = crypto.randomUUID()

console.log("🆔 reqId:", reqId)
console.log("⏱️ time:", time)

// load CryptoJS
if (!window.CryptoJS) {
console.log("📦 Loading CryptoJS...")
await new Promise(res => {
const s = document.createElement("script")
s.src = "https://cdnjs.cloudflare.com/ajax/libs/crypto-js/4.1.1/crypto-js.min.js"
s.onload = () => {
console.log("✅ CryptoJS Loaded")
res()
}
document.head.appendChild(s)
})
}

const key = CryptoJS.enc.Utf8.parse("kP9rT2vN8mJ1bZ6c")
const iv  = CryptoJS.enc.Utf8.parse("d7e8f9a0b1c2d3e4")

const raw = `t:WF;kZKMcXwKqE${reqId}`
console.log("🧾 raw:", raw)

const sign = CryptoJS.AES.encrypt(raw, key, {
iv,
mode: CryptoJS.mode.CBC,
padding: CryptoJS.pad.Pkcs7
}).toString()

console.log("🔐 sign:", sign)

const api = `https://apbood.boodstream.com/v1/file/getVideo?videoId=${videoId}&userStr=${userStr}`
console.log("🌐 API:", api)

try {

console.log("📤 Sending request...")

const res = await fetch(api, {
method: "GET",
mode: "cors",
headers: {
"a-req-id": reqId,
"a-time": time,
"user-client": crypto.randomUUID(),
"country-no": navigator.language || "en_US",
"a-sign": sign
}
})

console.log("📡 Status:", res.status)

const data = await res.json()
console.log("🔥 RESPONSE:", data)

if(data.code === 0){

const videoUrl = data.data.videoUrl

console.log("🎬 STREAM URL:", videoUrl)

// 🔥 ONLY ADD THIS LINE (reuse your existing player)
playStream(videoUrl)

// optional log in UI
document.getElementById("qualityBox").innerHTML += `
<div class="linkBox">🎬 ${videoUrl}</div>
`

}else{
console.log("❌ API Error:", data.msg)
}

}catch(e){
console.error("💥 Fetch failed:", e)
}

}

/* ---------------- JWPLAYER PARSER ---------------- */

function extractJW(html){

let fileRegex=/file\s*:\s*"([^"]+)"/g
let labelRegex=/label\s*:\s*"([^"]+)"/g

let files=[...html.matchAll(fileRegex)]
let labels=[...html.matchAll(labelRegex)]

currentSources=[]

for(let i=0;i<files.length;i++){

let streamURL = files[i][1]

/* ✅ APPLY PROXY ONLY FOR LULU / VIDNEST */
if(streamURL.includes("lulu") || streamURL.includes("vidnest")){
streamURL = PROXY + encodeURIComponent(streamURL)
}

currentSources.push({
file:streamURL,
label:labels[i] ? labels[i][1] : "auto"
})

}

if(currentSources.length>0){
renderQualityButtons()
playStream(currentSources[0].file)
}

}

/* ---------------- STRCLOUD PARSER ---------------- */

async function extractStrcloud(html){

let match=html.match(/id="(?:ideoooolink|captchalink|norobotlink)"[^>]*>(.*?)</)

if(!match) return

let url=match[1]

url=url.replace(/&amp;/g,"&")

if(url.startsWith("//")) url="https:"+url
if(url.startsWith("/")) url="https:"+url

let final=await followRedirect(url)

playStream(final)

}

/* ---------------- PLAYER ---------------- */

function playStream(url){

let player=document.getElementById("player")

if(hlsInstance){
hlsInstance.destroy()
hlsInstance=null
}

/* ✅ PREVENT DOUBLE PROXY */
if(!url.startsWith(PROXY) && url.includes(".m3u8")){
url = PROXY + encodeURIComponent(url)
}

if(url.includes(".m3u8")){

if(Hls.isSupported()){
hlsInstance=new Hls()
hlsInstance.loadSource(url)
hlsInstance.attachMedia(player)
}else{
player.src=url
}

}else{
player.src=url
}

player.play()

}

/* ---------------- QUALITY BUTTONS ---------------- */

function renderQualityButtons(){

let html=""

currentSources.forEach(s=>{
html+=`<button class="playbtn" onclick="playStream('${s.file}')">${s.label}</button>`
})

document.getElementById("qualityBox").innerHTML=html

}

/* ---------------- BACK ---------------- */

function back(){
document.getElementById("postPage").style.display="none"
document.getElementById("posts").style.display="grid"
}

</script>

</body>
</html>
