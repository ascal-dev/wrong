     class="hidden fixed inset-0 bg-black/95 z-[9999] flex items-center justify-center p-4">

<script>
    let PROXY = "https://leakemms.godess.workers.dev/?url=";
    const BASE = "https://pornchinese.net";
    
    let currentCategoryHref = '';
    let currentCategoryName = '';
    let currentVideoHref = '';
    let currentVideoTitle = '';
    let currentVideoDuration = '';
    let retryCount = 0;
    const MAX_RETRIES = 3;

    async function fetchHTML(url) {
        const full = PROXY + encodeURIComponent(url.startsWith("http") ? url : BASE + url);
        const res = await fetch(full);
        if (!res.ok) throw new Error(`HTTP ${res.status}`);
        const text = await res.text();
        return new DOMParser().parseFromString(text, "text/html");
    }

    function parseCategories(doc) {
        const categories = [];
        const cards = doc.querySelectorAll('a.grid-xx13');
        cards.forEach(card => {
            const href = card.getAttribute('href');
            const img = card.querySelector('img');
            const titleEl = card.querySelector('.grid-xx13-title');
            const countEl = card.querySelector('.grid-xx13-xx17');
            if (href && img) {
                categories.push({
                    href: href,
                    title: titleEl ? titleEl.textContent.trim() : img.getAttribute('alt') || 'Category',
                    img: img.getAttribute('src'),
                    count: countEl ? countEl.textContent.trim() : ''
                });
            }
        });
        return categories;
    }

    function parseVideos(doc) {
        const videos = [];
        const cards = doc.querySelectorAll('.grid-xx13');
        cards.forEach(card => {
            const videoLink = card.querySelector('a[href*="/videos"]');
            const img = card.querySelector('img');
            const duration = card.querySelector('.grid-xx13-xx17');
            const subcat = card.querySelector('.grid-xx13-xx4 a');
            if (videoLink && img) {
                videos.push({
                    href: videoLink.getAttribute('href'),
                    title: img.getAttribute('alt') || 'Video',
                    thumb: img.getAttribute('src'),
                    duration: duration ? duration.textContent.trim() : '??:??',
                    subcat: subcat ? subcat.textContent.trim() : ''
                });
            }
        });
        return videos;
    }

    function parsePagination(doc) {
        const pages = [];
        const pageLinks = doc.querySelectorAll('a[href*="/top/"], a[href*="/page/"]');
        pageLinks.forEach(a => {
            const href = a.getAttribute('href');
            const text = a.textContent.trim();
            if (href && text) {
                pages.push({ href: href, page: text });
            }
        });
        return pages.filter((v, i, a) => a.findIndex(t => t.href === v.href) === i);
    }

    // ==================== MP4 EXTRACTION WITH RETRIES ====================
    async function getDirectMP4(videoPageUrl, attempt = 1) {
        document.getElementById('attempt-count').textContent = attempt;
        document.getElementById('retry-btn').classList.add('hidden');
        
        try {
            const doc = await fetchHTML(videoPageUrl);
            
            let src = doc.querySelector('source[type="video/mp4"], source[src*=".mp4"]')?.getAttribute('src');
            if (src) return src;
            
            src = doc.querySelector('video')?.getAttribute('src');
            if (src) return src;
            
            const videos = doc.querySelectorAll('video');
            for (let v of videos) {
                if (v.shadowRoot) {
                    const shadowSrc = v.shadowRoot.querySelector('source')?.getAttribute('src');
                    if (shadowSrc) return shadowSrc;
                }
            }
            
            const scripts = doc.querySelectorAll('script');
            for (let script of scripts) {
                const match = (script.textContent || '').match(/https?:\/\/[^\s"'`]+\.mp4[^\s"'`]*/i);
                if (match) return match[0];
            }
            
            if (attempt < MAX_RETRIES) {
                await new Promise(r => setTimeout(r, 800)); // small delay between retries
                return getDirectMP4(videoPageUrl, attempt + 1);
            }
            
            return null;
        } catch (e) {
            console.error(`Attempt ${attempt} failed:`, e);
            if (attempt < MAX_RETRIES) {
                await new Promise(r => setTimeout(r, 1000));
                return getDirectMP4(videoPageUrl, attempt + 1);
            }
            return null;
        }
    }

    function renderCategories(cats) {
        const grid = document.getElementById('categories-grid');
        grid.innerHTML = '';
        cats.forEach(cat => {
            const imgUrl = cat.img.startsWith('http') ? cat.img : BASE + cat.img;
            grid.innerHTML += `
            <div onclick="loadVideos('${cat.href}', '${cat.title.replace(/'/g, "\\'")}')" 
                 class="card bg-zinc-900 rounded-3xl overflow-hidden cursor-pointer">
                <div class="thumb-container">
                    <img src="${imgUrl}" alt="${cat.title}" class="w-full" onerror="this.src='https://via.placeholder.com/640x360/111/fff?text=${cat.title}'">
                    ${cat.count ? `<div class="absolute bottom-4 right-4 bg-black/80 text-xs px-3 py-1 rounded-2xl">${cat.count}</div>` : ''}
                </div>
                <div class="p-5 text-center">
                    <div class="font-semibold">${cat.title}</div>
                </div>
            </div>`;
        });
    }

    function renderVideos(videos) {
        const grid = document.getElementById('videos-grid');
        grid.innerHTML = '';
        videos.forEach(vid => {
            const thumbUrl = vid.thumb.startsWith('http') ? vid.thumb : BASE + vid.thumb;
            grid.innerHTML += `
            <div onclick="openVideo('${vid.href}', '${vid.title.replace(/'/g, "\\'")}', '${vid.duration}')" 
                 class="card bg-zinc-900 rounded-3xl overflow-hidden cursor-pointer group">
                <div class="thumb-container">
                    <img src="${thumbUrl}" alt="${vid.title}" class="w-full" onerror="this.src='https://via.placeholder.com/640x360/111/fff?text=Video'">
                    <div class="absolute bottom-3 right-3 bg-black/80 text-xs px-2.5 py-px rounded-xl">${vid.duration}</div>
                </div>
                <div class="p-4">
                    <p class="line-clamp-2 text-sm">${vid.title}</p>
                </div>
            </div>`;
        });
    }

    function renderPagination(pages) {
        const bar = document.getElementById('pagination-bar');
        bar.innerHTML = '';
        if (pages.length < 2) return;
        pages.forEach(p => {
            const btn = document.createElement('button');
            btn.className = `px-5 py-2 rounded-2xl text-sm font-medium border border-zinc-700 hover:border-red-500`;
            btn.textContent = p.page;
            btn.onclick = () => loadSpecificPage(p.href);
            bar.appendChild(btn);
        });
    }

    async function loadHome() {
        document.getElementById('home-view').classList.remove('hidden');
        document.getElementById('videos-view').classList.add('hidden');
        document.getElementById('current-cat').textContent = '';
        try {
            const doc = await fetchHTML('/');
            renderCategories(parseCategories(doc));
        } catch (e) {
            console.error(e);
        }
    }

    async function loadVideos(href, name) {
        currentCategoryHref = href;
        currentCategoryName = name;
        document.getElementById('home-view').classList.add('hidden');
        document.getElementById('videos-view').classList.remove('hidden');
        document.getElementById('current-cat').textContent = name;
        document.getElementById('videos-title').textContent = name;
        
        try {
            const doc = await fetchHTML(href);
            renderVideos(parseVideos(doc));
            renderPagination(parsePagination(doc));
        } catch (e) {
            console.error(e);
        }
    }

    async function loadSpecificPage(pageHref) {
        document.getElementById('videos-grid').innerHTML = `<div class="col-span-full py-20 flex justify-center"><div class="w-8 h-8 border-4 border-red-500 border-t-transparent rounded-full animate-spin"></div></div>`;
        try {
            const doc = await fetchHTML(pageHref);
            renderVideos(parseVideos(doc));
            renderPagination(parsePagination(doc));
        } catch (e) {
            console.error(e);
        }
    }

    async function openVideo(href, title, duration) {
        currentVideoHref = href;
        currentVideoTitle = title;
        currentVideoDuration = duration;
        retryCount = 0;
        
        const modal = document.getElementById('modal');
        const player = document.getElementById('main-player');
        const loading = document.getElementById('player-loading');
        
        modal.classList.remove('hidden');
        player.classList.add('hidden');
        loading.classList.remove('hidden');
        
        document.getElementById('modal-title').textContent = title;
        document.getElementById('modal-duration').textContent = duration;
        document.getElementById('retry-btn').classList.add('hidden');
        
        await attemptExtraction();
    }

    async function attemptExtraction() {
        retryCount++;
        document.getElementById('attempt-count').textContent = retryCount;
        document.getElementById('retry-btn').classList.add('hidden');
        
        const mp4 = await getDirectMP4(currentVideoHref);
        
        if (mp4) {
            let finalUrl = mp4.startsWith('http') ? mp4 : BASE + mp4;
            if (finalUrl.includes('xnxx') || finalUrl.includes('asianmilf')) {
                finalUrl = PROXY + encodeURIComponent(finalUrl);
            }
            
            document.getElementById('mp4-link').textContent = finalUrl;
            const player = document.getElementById('main-player');
            player.src = finalUrl;
            document.getElementById('player-loading').classList.add('hidden');
            player.classList.remove('hidden');
            player.play().catch(() => {});
        } else {
            const loading = document.getElementById('player-loading');
            if (retryCount >= MAX_RETRIES) {
                document.getElementById('loading-text').innerHTML = `Failed after ${MAX_RETRIES} attempts`;
                document.getElementById('retry-btn').classList.remove('hidden');
            } else {
                // Will be handled by recursive call in getDirectMP4
            }
        }
    }

    function retryExtraction() {
        document.getElementById('loading-text').textContent = 'Retrying extraction...';
        attemptExtraction();
    }

    function closeModal() {
        const player = document.getElementById('main-player');
        player.pause();
        player.src = '';
        document.getElementById('modal').classList.add('hidden');
    }

    function copyMp4() {
        const txt = document.getElementById('mp4-link').textContent;
        navigator.clipboard.writeText(txt);
    }

    function refreshAll() {
        PROXY = document.getElementById('proxy-url').value.trim() || "https://leakemms.godess.workers.dev/?url=";
        showHome();
        setTimeout(loadHome, 150);
    }

    function showHome() {
        document.getElementById('home-view').classList.remove('hidden');
        document.getElementById('videos-view').classList.add('hidden');
        document.getElementById('current-cat').textContent = '';
    }

    window.onload = () => {
        console.log("%c✅ PornChinese Scraper with MP4 Retry System Ready", "color:#ff2d55; font-weight:bold");
        loadHome();
    };
</script>
