<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Camraja – Final Layout Fix</title>

<style>
:root{
  --bg:#000000;
  --card:#020617;
  --text:#e5e7eb;
  --muted:#94a3b8;
  --accent:#22c55e;
  --accent2:#ffffff;
}
*{box-sizing:border-box}
body{
  margin:0;
  font-family:system-ui;
  background:var(--bg);
  color:var(--text);
}
header{
  padding:14px;
  position:sticky;
  top:0;
  background:#020617;
  z-index:10;
}
header input{
  width:100%;
  padding:12px;
  border-radius:8px;
  border:none;
  font-size:15px;
}

/* ===== LIST PAGE ===== */
.grid{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(260px,1fr));
  gap:16px;
  padding:16px;
}
.card{
  background:var(--card);
  border-radius:12px;
  overflow:hidden;
  cursor:pointer;
}
.thumb{
  width:100%;
  height:180px;
  object-fit:cover;
}
.card .title{
  padding:10px;
  font-size:14px;
}

/* ===== PAGINATION ===== */
.pagination{
  display:flex;
  flex-wrap:wrap;
  gap:6px;
  justify-content:center;
  padding:16px;
}
.pagination button,
.pagination input{
  padding:8px 12px;
  border-radius:6px;
  border:none;
  background:#1e293b;
  color:#fff;
}
.pagination button.active{background:var(--accent2)}
.pagination input{width:70px}

/* ===== POST PAGE ===== */
#postView{
  display:none;
  max-width:900px;
  margin:auto;
  padding:16px;
}
.back{
  color:var(--accent2);
  cursor:pointer;
  margin-bottom:12px;
}
.post-thumb{
  width:100%;
  max-height:360px;
  object-fit:cover;
  border-radius:12px;
}
.post-meta{
  font-size:13px;
  color:var(--muted);
  margin:6px 0 14px;
}
.stream-row{
  display:flex;
  gap:10px;
  align-items:center;
  margin:10px 0;
  flex-wrap:wrap;
}
.stream-row a{
  flex:1;
  color:var(--muted);
  font-size:13px;
  word-break:break-all;
}
.play-btn{
  background:var(--accent);
  color:#022c22;
  border:none;
  padding:8px 14px;
  border-radius:6px;
  cursor:pointer;
  white-space:nowrap;
}

/* Player */
.player-wrapper{
  margin-top:14px;
}
.player-wrapper video,
.player-wrapper iframe{
  width:100%;
  height:400px;
  border:none;
  border-radius:12px;
  background:#000;
}

/* Quality buttons */
#qualityBox{
  display:flex;
  flex-wrap:wrap;
  gap:8px;
  margin-top:12px;
}
.playbtn{
  background:#1e293b;
  color:#fff;
  border:none;
  padding:8px 12px;
  border-radius:6px;
  cursor:pointer;
}
.linkBox{
  margin-top:8px;
  padding:10px;
  background:#0f172a;
  border-radius:8px;
  color:#cbd5e1;
  font-size:12px;
  word-break:break-all;
}

/* Image gallery */
.image-grid{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(140px,1fr));
  gap:8px;
  margin-top:16px;
}
.image-grid img{
  width:100%;
  height:auto;
  object-fit:contain;
  border-radius:8px;
}
</style>
</head>

<body>

<header>
  <input id="searchInput" placeholder="Search posts…">
</header>

<div id="listView">
  <div id="posts" class="grid"></div>
  <div id="pagination" class="pagination"></div>
</div>

<div id="postView">
  <div class="back" onclick="backToList()">← Back</div>
  <img id="postThumb" class="post-thumb">
  <h2 id="postTitle"></h2>
  <div id="postMeta" class="post-meta"></div>
  <div id="postContent"></div>

  <h3>Downloads / Streams</h3>
  <div id="postStreams"></div>

  <div id="postPlayer"></div>
  <div id="qualityBox"></div>

  <h3>Images</h3>
  <div id="postImages" class="image-grid"></div>
</div>

<script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
<script>
const API='https://camraja.com/wp-json/wp/v2/posts?_embed&per_page=10';
const PROXY='https://allinone.ascalrack.workers.dev/?url=';

let page=1, search='', totalPages=1;
let currentSources=[];
let hlsInstance=null;

const decode=h=>h.replace(/&lt;/g,'<').replace(/&gt;/g,'>').replace(/&quot;/g,'"');
const clean=u=>u.split(/[?#]/)[0];

/* ===== HELPERS ===== */
async function proxyFetch(url){
  const r = await fetch(PROXY + encodeURIComponent(url));
  return await r.text();
}

async function followRedirect(url){
  try{
    const r = await fetch(PROXY + encodeURIComponent(url), { redirect:'follow' });
    return r.url || url;
  }catch{
    return url;
  }
}

function escapeAttr(str=''){
  return str.replace(/"/g,'&quot;');
}

/* ===== SOURCE NAME ===== */
function sourceName(u){
  if(/krakenfiles/i.test(u)) return 'KrakenFiles';
  if(/mixdrop|mxdrop/i.test(u)) return 'MixDrop';
  if(/luluvid|luluvdoo|vidnest/i.test(u)) return 'Lulu';
  if(/voe\./i.test(u)) return 'VOE';
  if(/streamtape/i.test(u)) return 'Streamtape';
  if(/boodstream/i.test(u)) return 'Boodstream';
  if(/strcloud|advertape|tapeadsenjoyer/i.test(u)) return 'Strcloud';
  return 'Stream';
}

/* ===== EMBED NORMALIZE ===== */
function normalize(u){
  let m;
  if(m=u.match(/krakenfiles\.com\/view\/([^\/]+)/i)) return `https://krakenfiles.com/embed-video/${m[1]}`;
  if(m=u.match(/mxdrop\.to\/f\/([^\/]+)/i)) return `https://mixdrop.co/e/${m[1]}`;
  if(m=u.match(/mixdrop\.co\/e\/([^\/]+)/i)) return `https://mixdrop.co/e/${m[1]}`;
  if(m=u.match(/luluvid\.com\/([a-z0-9]+)/i)) return `https://luluvid.com/embed/${m[1]}`;
  if(m=u.match(/luluvdoo\.com\/d\/([a-z0-9]+)/i)) return `https://luluvdoo.com/e/${m[1]}`;
  if(m=u.match(/voe\.(sx|uno|cx)\/([a-z0-9]+)/i)) return `https://voe.sx/e/${m[2]}`;
  if(m=u.match(/streamtape\.com\/e\/([^\/]+)/i)) return `https://streamtape.com/e/${m[1]}`;
  return null;
}

/* ===== PLAYER ===== */
function ensureVideoPlayer(){
  let player = document.getElementById('player');
  if(player) return player;

  postPlayer.innerHTML = `
    <div class="player-wrapper">
      <video id="player" controls playsinline></video>
    </div>
  `;
  return document.getElementById('player');
}

function playStream(url){
  const player = ensureVideoPlayer();

  if(hlsInstance){
    hlsInstance.destroy();
    hlsInstance = null;
  }

  if(!url.startsWith(PROXY) && url.includes('.m3u8')){
    url = PROXY + encodeURIComponent(url);
  }

  if(url.includes('.m3u8')){
    if(window.Hls && Hls.isSupported()){
      hlsInstance = new Hls();
      hlsInstance.loadSource(url);
      hlsInstance.attachMedia(player);
    }else{
      player.src = url;
    }
  }else{
    player.src = url;
  }

  player.play().catch(()=>{});
}

function renderIframe(src){
  if(hlsInstance){
    hlsInstance.destroy();
    hlsInstance = null;
  }
  postPlayer.innerHTML = `
    <div class="player-wrapper">
      <iframe src="${escapeAttr(src)}" allowfullscreen></iframe>
    </div>
  `;
}

function renderQualityButtons(){
  const box = document.getElementById("qualityBox");
  box.innerHTML = "";

  currentSources.forEach(source=>{
    const btn = document.createElement("button");
    btn.className = "playbtn";
    btn.textContent = source.label || "auto";
    btn.onclick = ()=>playStream(source.file);
    box.appendChild(btn);
  });
}

/* ---------------- STREAM EXTRACTION ---------------- */

async function extractStream(link){
  let html = await proxyFetch(link);

  /* JWPLAYER HOSTS */
  if(
    link.includes("vidnest") ||
    link.includes("luluvid") ||
    link.includes("luluvdoo") ||
    link.includes("lulu")
  ){
    extractJW(html);
    return true;
  }

  /* STRCLOUD */
  if(
    link.includes("strcloud") ||
    link.includes("advertape") ||
    link.includes("tapeadsenjoyer")
  ){
    await extractStrcloud(html);
    return true;
  }

  /* BOODSTREAM */
  if(link.includes("boodstream.cc")){
    await extractBoodstream(link);
    return true;
  }

  return false;
}

async function extractBoodstream(link){
  console.log("🎯 BOODSTREAM LINK:", link);

  const match = link.match(/boodstream\.cc\/([A-Z0-9]+)/i);

  if(!match){
    console.log("❌ Invalid boodstream link");
    return;
  }

  const videoId = match[1];
  const reqId = crypto.randomUUID();
  const time = Date.now().toString();
  const userStr = crypto.randomUUID();

  if(!window.CryptoJS){
    await new Promise(res=>{
      const s = document.createElement("script");
      s.src = "https://cdnjs.cloudflare.com/ajax/libs/crypto-js/4.1.1/crypto-js.min.js";
      s.onload = res;
      document.head.appendChild(s);
    });
  }

  const key = CryptoJS.enc.Utf8.parse("kP9rT2vN8mJ1bZ6c");
  const iv  = CryptoJS.enc.Utf8.parse("d7e8f9a0b1c2d3e4");
  const raw = `t:WF;kZKMcXwKqE${reqId}`;

  const sign = CryptoJS.AES.encrypt(raw, key, {
    iv,
    mode: CryptoJS.mode.CBC,
    padding: CryptoJS.pad.Pkcs7
  }).toString();

  const api = `https://apbood.boodstream.com/v1/file/getVideo?videoId=${videoId}&userStr=${userStr}`;

  try{
    const res = await fetch(api, {
      method: "GET",
      mode: "cors",
      headers: {
        "a-req-id": reqId,
        "a-time": time,
        "user-client": crypto.randomUUID(),
        "country-no": navigator.language || "en_US",
        "a-sign": sign
      }
    });

    const data = await res.json();
    console.log("🔥 RESPONSE:", data);

    if(data.code === 0 && data.data?.videoUrl){
      const videoUrl = data.data.videoUrl;
      currentSources = [{ file: videoUrl, label: "auto" }];
      renderQualityButtons();
      playStream(videoUrl);
    }else{
      console.log("❌ API Error:", data.msg);
      postPlayer.innerHTML = 'Failed';
    }
  }catch(e){
    console.error("💥 Fetch failed:", e);
    postPlayer.innerHTML = 'Failed';
  }
}

/* ---------------- JWPLAYER PARSER ---------------- */

function extractJW(html){
  const fileRegex = /file\s*:\s*"([^"]+)"/g;
  const labelRegex = /label\s*:\s*"([^"]+)"/g;

  const files = [...html.matchAll(fileRegex)];
  const labels = [...html.matchAll(labelRegex)];

  currentSources = [];

  for(let i=0;i<files.length;i++){
    let streamURL = files[i][1];

    if(
      streamURL.includes("lulu") ||
      streamURL.includes("luluvdoo") ||
      streamURL.includes("vidnest")
    ){
      streamURL = PROXY + encodeURIComponent(streamURL);
    }

    currentSources.push({
      file: streamURL,
      label: labels[i] ? labels[i][1] : "auto"
    });
  }

  if(currentSources.length > 0){
    renderQualityButtons();
    playStream(currentSources[0].file);
  }else{
    postPlayer.innerHTML = 'Failed';
  }
}

/* ---------------- STRCLOUD PARSER ---------------- */

async function extractStrcloud(html){
  const match = html.match(/id="(?:ideoooolink|captchalink|norobotlink)"[^>]*>(.*?)</);

  if(!match){
    postPlayer.innerHTML = 'Failed';
    return;
  }

  let url = match[1];
  url = url.replace(/&amp;/g,"&");

  if(url.startsWith("//")) url = "https:" + url;
  if(url.startsWith("/")) url = "https:" + url;

  const final = await followRedirect(url);

  currentSources = [{ file: final, label: "auto" }];
  renderQualityButtons();
  playStream(final);
}

/* ===== FALLBACK RESOLVE VIDEO ===== */
async function resolveVideo(u){
  const direct = normalize(u);
  if(direct) return direct;

  try{
    const r = await fetch(PROXY + encodeURIComponent(u));
    const t = decode(await r.text());
    const m = t.match(/<iframe[^>]+src=["']([^"']+)["']/i);
    return m ? clean(m[1]) : null;
  }catch{
    return null;
  }
}

/* ===== EXTRACT LINKS ===== */
function extractStreams(html){
  const urls = [...decode(html).matchAll(/https?:\/\/[^\s"'<>]+/gi)]
    .map(m=>clean(m[0]))
    .filter(u =>
      !u.match(/\.(jpg|png|gif|webp)$/i) &&
      !u.includes('imagetape.com')
    );

  return [...new Set(urls)];
}

function extractImages(html){
  const doc = document.createElement('div');
  doc.innerHTML = decode(html);
  return [...doc.querySelectorAll('img')].map(i=>clean(i.src));
}

/* ===== LOAD POSTS ===== */
async function loadPosts(){
  posts.innerHTML='Loading…';
  const r=await fetch(`${API}&page=${page}&search=${search}`);
  totalPages=parseInt(r.headers.get('X-WP-TotalPages')||1);
  const d=await r.json();
  posts.innerHTML='';
  d.forEach(p=>{
    const img=p._embedded?.['wp:featuredmedia']?.[0]?.source_url||'';
    const c=document.createElement('div');
    c.className='card';
    c.innerHTML=img
      ? `<img class="thumb" src="${img}"><div class="title">${p.title.rendered}</div>`
      : `<div class="title">${p.title.rendered}</div>`;
    c.onclick=()=>openPost(p);
    posts.appendChild(c);
  });
  renderPagination();
}

/* ===== PAGINATION ===== */
function renderPagination(){
  pagination.innerHTML='';
  const add=(t,f,a)=>{
    const b=document.createElement('button');
    b.textContent=t;
    if(a) b.classList.add('active');
    b.onclick=f;
    pagination.appendChild(b);
  };
  add('Prev',()=>page>1&&(page--,loadPosts()));
  for(let i=Math.max(1,page-2);i<=Math.min(totalPages,page+2);i++){
    add(i,()=>{page=i;loadPosts();},i===page);
  }
  add('Next',()=>page<totalPages&&(page++,loadPosts()));
  const i=document.createElement('input');
  i.type='number';
  i.min=1;
  i.max=totalPages;
  pagination.appendChild(i);
  add('Go',()=>{const v=parseInt(i.value);if(v>=1&&v<=totalPages){page=v;loadPosts();}});
}

/* ===== OPEN POST ===== */
function openPost(p){
  listView.style.display='none';
  postView.style.display='block';

  currentSources = [];
  if(hlsInstance){
    hlsInstance.destroy();
    hlsInstance = null;
  }

  postThumb.src=p._embedded?.['wp:featuredmedia']?.[0]?.source_url||'';
  postTitle.innerHTML=p.title.rendered;

  const date=new Date(p.date);
  postMeta.textContent=`Posted on ${date.toDateString()} at ${date.toLocaleTimeString()}`;

  const cleanText=document.createElement('div');
  cleanText.innerHTML=decode(p.content.rendered);
  cleanText.querySelectorAll('iframe,img,script').forEach(e=>e.remove());
  postContent.innerHTML=cleanText.innerHTML;

  postStreams.innerHTML='';
  postPlayer.innerHTML='';
  qualityBox.innerHTML='';

  extractStreams(p.content.rendered).forEach(u=>{
    const row=document.createElement('div');
    row.className='stream-row';
    row.innerHTML=`<a href="${u}" target="_blank">${u}</a>`;

    const b=document.createElement('button');
    b.className='play-btn';
    b.textContent=`Play (${sourceName(u)})`;

    b.onclick=async()=>{
      b.textContent='Loading…';
      postPlayer.innerHTML='';
      qualityBox.innerHTML='';
      currentSources=[];

      try{
        const handled = await extractStream(u);

        if(!handled){
          const src = await resolveVideo(u);

          if(src){
            renderIframe(src);
          }else{
            postPlayer.innerHTML='Failed';
          }
        }
      }catch(err){
        console.error(err);
        postPlayer.innerHTML='Failed';
      }

      b.textContent=`Play (${sourceName(u)})`;
    };

    row.appendChild(b);
    postStreams.appendChild(row);
  });

  postImages.innerHTML='';
  extractImages(p.content.rendered).forEach(src=>{
    const img=document.createElement('img');
    img.src=src;
    postImages.appendChild(img);
  });
}

/* ===== NAV ===== */
function backToList(){
  if(hlsInstance){
    hlsInstance.destroy();
    hlsInstance = null;
  }
  postView.style.display='none';
  listView.style.display='block';
}

searchInput.oninput=e=>{
  search=e.target.value;
  page=1;
  loadPosts();
};

loadPosts();
</script>

</body>
</html>
