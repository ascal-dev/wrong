<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TITAN ELITE // COMMAND CENTER</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/crypto-js/4.1.1/crypto-js.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/hls.js/1.4.10/hls.min.js"></script>

    <style>
        :root {
            --bg: #010409;
            --surface: #0d1117;
            --accent: #10b981;
            --accent-glow: rgba(16, 185, 129, 0.2);
            --text-main: #ffffff;
            --text-dim: #8b949e;
            --border: rgba(255, 255, 255, 0.1);
            --glass: rgba(13, 17, 23, 0.9);
        }

        * { box-sizing: border-box; font-family: 'Inter', system-ui, sans-serif; transition: all 0.2s ease; }
        body { margin: 0; background: var(--bg); color: var(--text-main); overflow-x: hidden; }

        /* --- PREMIUM HEADER --- */
        header {
            height: 70px; display: flex; align-items: center; justify-content: space-between;
            padding: 0 5%; position: sticky; top: 0; z-index: 1000;
            background: var(--glass); backdrop-filter: blur(20px); border-bottom: 1px solid var(--border);
        }
        .logo { font-size: 22px; font-weight: 900; color: var(--accent); text-shadow: 0 0 15px var(--accent-glow); }

        /* --- ADVANCED PAGINATION --- */
        .pagination-container {
            display: flex; align-items: center; justify-content: center;
            gap: 10px; padding: 25px 10px; flex-wrap: wrap; background: var(--bg);
        }
        .nav-btn {
            background: var(--surface); border: 1px solid var(--border);
            color: white; padding: 10px 18px; border-radius: 8px;
            cursor: pointer; font-weight: 700; font-size: 12px;
        }
        .nav-btn:hover:not(:disabled) { border-color: var(--accent); color: var(--accent); }
        .nav-btn:disabled { opacity: 0.3; cursor: not-allowed; }

        .jump-box {
            display: flex; align-items: center; background: var(--surface);
            border: 1px solid var(--border); border-radius: 8px; padding: 0 5px;
        }
        .jump-box input {
            width: 50px; background: transparent; border: none; color: var(--accent);
            text-align: center; font-weight: 800; outline: none; padding: 10px 0;
        }
        .go-btn {
            background: var(--accent); color: #000; border: none;
            padding: 6px 12px; border-radius: 6px; font-weight: 900;
            font-size: 11px; cursor: pointer; margin-left: 5px;
        }
        .page-counter { font-size: 12px; color: var(--text-dim); font-weight: 600; padding: 0 10px; }

        /* --- GRID SYSTEM --- */
        .stage { display: none; }
        .stage.active { display: block; animation: fadeIn 0.4s ease; }
        @keyframes fadeIn { from { opacity: 0; transform: scale(0.98); } to { opacity: 1; transform: scale(1); } }

        .grid {
            display: grid; grid-template-columns: repeat(2, 1fr);
            gap: 12px; padding: 0 12px; max-width: 1200px; margin: auto;
        }
        .card {
            background: var(--surface); border-radius: 12px; overflow: hidden;
            border: 1px solid var(--border); cursor: pointer;
        }
        .poster-box {
            position: relative; width: 100%; padding-top: 140%; background: #000;
        }
        .poster-main { position: absolute; top: 0; left: 0; width: 100%; height: 100%; object-fit: contain; z-index: 2; }
        .poster-blur { position: absolute; top: 0; left: 0; width: 100%; height: 100%; object-fit: cover; filter: blur(20px); opacity: 0.3; }
        .card-title { padding: 10px; font-size: 12px; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

        /* --- DETAIL PAGE --- */
        .detail-header { padding: 15px; display: flex; align-items: center; gap: 15px; border-bottom: 1px solid var(--border); }
        .player-box { width: 100%; background: #000; aspect-ratio: 16/9; }
        video { width: 100%; height: 100%; }
        .server-grid { padding: 15px; display: grid; gap: 10px; }
        .server-row {
            background: var(--surface); padding: 12px; border-radius: 10px;
            display: flex; justify-content: space-between; align-items: center; border: 1px solid var(--border);
        }
        .extract-btn { background: var(--accent); color: #000; border: none; padding: 8px 16px; border-radius: 6px; font-weight: 800; cursor: pointer; }

        .loader { width: 16px; height: 16px; border: 2px solid #fff; border-bottom-color: transparent; border-radius: 50%; display: inline-block; animation: spin 1s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body>

<header>
    <div class="logo">TITAN<span>ELITE</span></div>
    <div id="status" style="font-size: 11px; color: var(--accent);">READY</div>
</header>

<div id="homeStage" class="stage active">
    <div class="pagination-container" id="pagiTop"></div>

    <div id="postsGrid" class="grid"></div>

    <div class="pagination-container" id="pagiBottom"></div>
</div>

<div id="detailStage" class="stage">
    <div class="detail-header">
        <button class="nav-btn" onclick="goBack()">← GALLERY</button>
        <span id="postTitle" style="font-size:14px; font-weight:bold; white-space:nowrap; overflow:hidden; text-overflow:ellipsis;"></span>
    </div>
    <div class="player-box">
        <video id="mainPlayer" controls playsinline></video>
    </div>
    <div id="serverList" class="server-grid"></div>
</div>

<script>
    let curPage = 1;
    let totalPages = 1;
    const perPage = 16;
    const PROXY = "https://allinone.godess.workers.dev/?url=";
    const API_BASE = "https://camraja.com/wp-json/wp/v2/posts?_embed&per_page=" + perPage;
    let hls = null;

    async function load(page) {
        window.scrollTo(0, 0);
        document.getElementById('status').innerHTML = '<span class="loader"></span>';
        
        try {
            const res = await fetch(`${API_BASE}&page=${page}`);
            totalPages = parseInt(res.headers.get('X-WP-TotalPages')) || 1;
            const posts = await res.json();
            
            curPage = page;
            renderGrid(posts);
            renderPagi();
        } catch (e) {
            alert("End of the line or Network Error.");
        }
        document.getElementById('status').innerText = 'ONLINE';
    }

    function renderGrid(posts) {
        const grid = document.getElementById('postsGrid');
        grid.innerHTML = '';
        posts.forEach(p => {
            const img = p._embedded?.['wp:featuredmedia']?.[0]?.source_url || '';
            const card = document.createElement('div');
            card.className = 'card';
            card.innerHTML = `
                <div class="poster-box">
                    <img src="${img}" class="poster-blur">
                    <img src="${img}" class="poster-main" loading="lazy">
                </div>
                <div class="card-title">${p.title.rendered}</div>
            `;
            card.onclick = () => showDetail(p);
            grid.appendChild(card);
        });
    }

    function renderPagi() {
        const pagiHtml = `
            <button class="nav-btn" ${curPage <= 1 ? 'disabled' : ''} onclick="load(${curPage - 1})">PREV</button>
            <div class="page-counter">${curPage} / ${totalPages}</div>
            <div class="jump-box">
                <input type="number" id="jumpVal" placeholder="${curPage}" min="1" max="${totalPages}">
                <button class="go-btn" onclick="doJump(this)">GO</button>
            </div>
            <button class="nav-btn" ${curPage >= totalPages ? 'disabled' : ''} onclick="load(${curPage + 1})">NEXT</button>
        `;
        document.getElementById('pagiTop').innerHTML = pagiHtml;
        document.getElementById('pagiBottom').innerHTML = pagiHtml;
    }

    function doJump(btn) {
        const val = btn.parentElement.querySelector('input').value;
        const pageNum = parseInt(val);
        if (pageNum > 0 && pageNum <= totalPages) {
            load(pageNum);
        } else {
            alert("Invalid Page Number");
        }
    }

    function showDetail(p) {
        document.getElementById('homeStage').classList.remove('active');
        document.getElementById('detailStage').classList.add('active');
        document.getElementById('postTitle').innerText = p.title.rendered;
        
        const list = document.getElementById('serverList');
        list.innerHTML = '';
        const links = [...new Set(p.content.rendered.match(/https?:\/\/[^\s"'<>]+/g))];

        links.forEach(l => {
            if (l.match(/\.(jpg|png|gif|webp|svg|js|css)/i)) return;
            const row = document.createElement('div');
            row.className = 'server-row';
            row.innerHTML = `
                <span style="font-size:12px; color:var(--text-dim)">${l.split('/')[2]}</span>
                <button class="extract-btn" onclick="extract('${l}', this)">EXTRACT</button>
            `;
            list.appendChild(row);
        });
    }

    async function extract(url, btn) {
        const old = btn.innerHTML;
        btn.innerHTML = '<span class="loader"></span>';
        try {
            const html = await fetch(PROXY + encodeURIComponent(url)).then(r => r.text());
            const file = html.match(/file\s*:\s*"([^"]+)"/)?.[1];
            if (file) play(file);
        } catch (e) { alert("Source extraction failed."); }
        btn.innerHTML = old;
    }

    function play(src) {
        const video = document.getElementById('mainPlayer');
        if (src.includes(".m3u8") && !src.startsWith(PROXY)) src = PROXY + encodeURIComponent(src);
        if (hls) hls.destroy();
        if (Hls.isSupported() && src.includes(".m3u8")) {
            hls = new Hls({ xhrSetup: (xhr, u) => {
                if (!u.startsWith(PROXY) && !u.startsWith('blob:')) xhr.open('GET', PROXY + encodeURIComponent(u), true);
            }});
            hls.loadSource(src);
            hls.attachMedia(video);
            hls.on(Hls.Events.MANIFEST_PARSED, () => video.play());
        } else {
            video.src = src; video.play();
        }
    }

    function goBack() {
        if (hls) hls.destroy();
        document.getElementById('detailStage').classList.remove('active');
        document.getElementById('homeStage').classList.add('active');
    }

    load(1);
</script>
</body>
</html>
