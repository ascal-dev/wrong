<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Camraja – Fixed Lulu Extraction</title>

<style>
:root{
  --bg:#000000;
  --card:#020617;
  --text:#e5e7eb;
  --muted:#94a3b8;
  --accent:#22c55e;
  --accent2:#ffffff;
  --extract:#38bdf8;
  --danger:#e11d48;
}
*{box-sizing:border-box}
body{
  margin:0;
  font-family:system-ui,sans-serif;
  background:var(--bg);
  color:var(--text);
}
header{
  padding:14px;
  position:sticky;
  top:0;
  background:#020617;
  z-index:10;
}
header input{
  width:100%;
  padding:12px;
  border-radius:8px;
  border:none;
  font-size:15px;
}

.grid{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(260px,1fr));
  gap:16px;
  padding:16px;
}
.card{
  background:var(--card);
  border-radius:12px;
  overflow:hidden;
  cursor:pointer;
}
.thumb{
  width:100%;
  height:180px;
  object-fit:cover;
}
.card .title{
  padding:10px;
  font-size:14px;
}

.pagination{
  display:flex;
  flex-wrap:wrap;
  gap:6px;
  justify-content:center;
  padding:16px;
}
.pagination button,
.pagination input{
  padding:8px 12px;
  border-radius:6px;
  border:none;
  background:#1e293b;
  color:#fff;
}
.pagination button.active{
  background:var(--accent2);
  color:#000;
}
.pagination input{
  width:70px;
}

#postView{
  display:none;
  max-width:900px;
  margin:auto;
  padding:16px;
}
.back{
  color:var(--accent2);
  cursor:pointer;
  margin-bottom:12px;
}
.post-thumb{
  width:100%;
  max-height:360px;
  object-fit:cover;
  border-radius:12px;
}
.post-meta{
  font-size:13px;
  color:var(--muted);
  margin:6px 0 14px;
}
.stream-row{
  display:flex;
  gap:10px;
  align-items:center;
  margin:10px 0;
  flex-wrap:wrap;
  background:#0f172a;
  border-radius:10px;
  padding:10px;
}
.stream-row a{
  flex:1;
  color:var(--muted);
  font-size:13px;
  word-break:break-all;
  text-decoration:none;
}
.play-btn,
.extract-btn,
.quality-btn{
  border:none;
  padding:8px 14px;
  border-radius:6px;
  cursor:pointer;
  white-space:nowrap;
}
.play-btn{
  background:var(--accent);
  color:#022c22;
}
.extract-btn{
  background:var(--extract);
  color:#082f49;
}
.quality-btn{
  background:var(--danger);
  color:#fff;
}

.player-shell{
  margin-top:14px;
  background:#020617;
  padding:12px;
  border-radius:12px;
}
.player-shell video{
  width:100%;
  max-height:500px;
  background:#000;
  border-radius:10px;
}
.player-status{
  margin-top:10px;
  color:var(--muted);
  font-size:13px;
  white-space:pre-wrap;
}
.player-actions{
  display:flex;
  gap:8px;
  flex-wrap:wrap;
  margin-top:10px;
}

.player-wrapper{
  margin-top:14px;
}
.player-wrapper iframe{
  width:100%;
  height:400px;
  border:none;
  border-radius:12px;
}

.image-grid{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(140px,1fr));
  gap:8px;
  margin-top:16px;
}
.image-grid img{
  width:100%;
  height:auto;
  object-fit:contain;
  border-radius:8px;
}
</style>
</head>

<body>

<header>
  <input id="searchInput" placeholder="Search posts…">
</header>

<div id="listView">
  <div id="posts" class="grid"></div>
  <div id="pagination" class="pagination"></div>
</div>

<div id="postView">
  <div class="back" onclick="backToList()">← Back</div>
  <img id="postThumb" class="post-thumb">
  <h2 id="postTitle"></h2>
  <div id="postMeta" class="post-meta"></div>
  <div id="postContent"></div>

  <h3>Downloads / Streams</h3>
  <div id="postStreams"></div>

  <div id="postPlayer"></div>

  <h3>Images</h3>
  <div id="postImages" class="image-grid"></div>
</div>

<script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
<script>
const API = 'https://camraja.com/wp-json/wp/v2/posts?_embed&per_page=10';
const PROXY = 'https://allinone.ascalrack.workers.dev/?url=';

let page = 1;
let search = '';
let totalPages = 1;

let currentSources = [];
let hlsInstance = null;

/* =========================
   HELPERS
========================= */
const decodeHtml = h => String(h || '')
  .replace(/&lt;/g,'<')
  .replace(/&gt;/g,'>')
  .replace(/&quot;/g,'"')
  .replace(/&#039;/g,"'")
  .replace(/&amp;/g,'&');

function cleanUrl(u){
  return String(u || '').trim();
}

function deSlash(u){
  return String(u || '')
    .replace(/\\u0026/g, '&')
    .replace(/\\\//g, '/')
    .replace(/\\\\/g, '\\');
}

function uniqueByFile(arr){
  const out = [];
  const seen = new Set();
  for(const item of arr){
    const key = item.file;
    if(!key || seen.has(key)) continue;
    seen.add(key);
    out.push(item);
  }
  return out;
}

function absUrl(url, base){
  try{
    return new URL(url, base).href;
  }catch{
    return url;
  }
}

function isLuluLink(u){
  return /luluvid|luluvdoo|vidnest|lulu/i.test(String(u || ''));
}

function sourceName(u){
  if(/krakenfiles/i.test(u)) return 'KrakenFiles';
  if(/mixdrop|mxdrop/i.test(u)) return 'MixDrop';
  if(/luluvid|luluvdoo|vidnest|lulu/i.test(u)) return 'Lulu';
  if(/voe\./i.test(u)) return 'VOE';
  if(/streamtape/i.test(u)) return 'Streamtape';
  return 'Stream';
}

function normalizeLuluUrl(u){
  u = cleanUrl(u);

  let m = u.match(/https?:\/\/(?:www\.)?(luluvid\.com|luluvdoo\.com|vidnest\.net|vidnest\.in|vidnest\.org)\/(?:d|e|v|embed)?\/?([a-zA-Z0-9]+)/i);
  if(m){
    return `https://${m[1]}/embed/${m[2]}`;
  }

  m = u.match(/https?:\/\/(?:www\.)?(luluvid\.com|luluvdoo\.com|vidnest\.net|vidnest\.in|vidnest\.org)\/([a-zA-Z0-9]+)$/i);
  if(m){
    return `https://${m[1]}/embed/${m[2]}`;
  }

  return u;
}

async function proxyFetch(url){
  const res = await fetch(PROXY + encodeURIComponent(url));
  return await res.text();
}

/* =========================
   NORMAL EMBED PLAYER
========================= */
function normalize(u){
  let m;
  if(m = u.match(/krakenfiles\.com\/view\/([^\/]+)/i)) return `https://krakenfiles.com/embed-video/${m[1]}`;
  if(m = u.match(/mxdrop\.to\/f\/([^\/]+)/i)) return `https://mixdrop.co/e/${m[1]}`;
  if(m = u.match(/mixdrop\.co\/e\/([^\/]+)/i)) return `https://mixdrop.co/e/${m[1]}`;
  if(m = u.match(/luluvid\.com\/([a-z0-9]+)/i)) return `https://luluvid.com/embed/${m[1]}`;
  if(m = u.match(/luluvdoo\.com\/([a-z0-9]+)/i)) return `https://luluvdoo.com/embed/${m[1]}`;
  if(m = u.match(/voe\.(sx|uno|cx)\/([a-z0-9]+)/i)) return `https://voe.sx/e/${m[2]}`;
  if(m = u.match(/streamtape\.com\/e\/([^\/]+)/i)) return `https://streamtape.com/e/${m[1]}`;
  return null;
}

async function resolveVideo(u){
  const direct = normalize(u);
  if(direct) return direct;

  try{
    const r = await fetch(PROXY + encodeURIComponent(u));
    const t = decodeHtml(await r.text());
    const m = t.match(/<iframe[^>]+src=["']([^"']+)["']/i);
    return m ? cleanUrl(m[1]) : null;
  }catch{
    return null;
  }
}

/* =========================
   CONTENT EXTRACTION
========================= */
function extractStreams(html){
  const urls = [...decodeHtml(html).matchAll(/https?:\/\/[^\s"'<>]+/gi)]
    .map(m => cleanUrl(m[0]))
    .filter(u =>
      !u.match(/\.(jpg|jpeg|png|gif|webp)$/i) &&
      !u.includes('imagetape.com')
    );

  return [...new Set(urls)];
}

function extractImages(html){
  const doc = document.createElement('div');
  doc.innerHTML = decodeHtml(html);
  return [...doc.querySelectorAll('img')]
    .map(i => cleanUrl(i.src))
    .filter(Boolean);
}

/* =========================
   PLAYER
========================= */
function ensureVideoPlayerUI(){
  postPlayer.innerHTML = `
    <div class="player-shell">
      <video id="customVideoPlayer" controls playsinline></video>
      <div id="customQualityBox" class="player-actions"></div>
      <div id="customPlayerStatus" class="player-status">Ready.</div>
    </div>
  `;
}

function setPlayerStatus(msg){
  const el = document.getElementById('customPlayerStatus');
  if(el) el.textContent = msg;
}

function destroyHls(){
  if(hlsInstance){
    hlsInstance.destroy();
    hlsInstance = null;
  }
}

function playCustomStream(url){
  ensureVideoPlayerUI();

  const player = document.getElementById('customVideoPlayer');
  destroyHls();

  let finalUrl = cleanUrl(url);

  if(!finalUrl.startsWith(PROXY) && /\.m3u8(\?|$)/i.test(finalUrl)){
    finalUrl = PROXY + encodeURIComponent(finalUrl);
  }

  if(/\.m3u8(\?|$)/i.test(finalUrl)){
    if(window.Hls && Hls.isSupported()){
      hlsInstance = new Hls();
      hlsInstance.loadSource(finalUrl);
      hlsInstance.attachMedia(player);
      hlsInstance.on(Hls.Events.MANIFEST_PARSED, function(){
        player.play().catch(() => {});
      });
      hlsInstance.on(Hls.Events.ERROR, function(event, data){
        console.error('HLS error:', data);
      });
    }else{
      player.src = finalUrl;
      player.play().catch(() => {});
    }
  }else{
    player.src = finalUrl;
    player.play().catch(() => {});
  }

  setPlayerStatus(`Playing extracted stream:\n${finalUrl}`);
}

function renderQualityButtons(){
  ensureVideoPlayerUI();
  const box = document.getElementById('customQualityBox');
  box.innerHTML = '';

  currentSources.forEach(src => {
    const btn = document.createElement('button');
    btn.className = 'quality-btn';
    btn.textContent = src.label || 'auto';
    btn.onclick = () => playCustomStream(src.file);
    box.appendChild(btn);
  });
}

/* =========================
   LULU EXTRACTION
========================= */
function parseDirectMediaUrls(html, baseUrl){
  const out = [];

  const patterns = [
    /https?:\/\/[^\s"'<>\\]+\.m3u8(?:\?[^\s"'<>]*)?/gi,
    /https?:\/\/[^\s"'<>\\]+\.mp4(?:\?[^\s"'<>]*)?/gi,
    /https?:\\\/\\\/[^\s"'<>]+\.m3u8(?:\?[^\s"'<>]*)?/gi,
    /https?:\\\/\\\/[^\s"'<>]+\.mp4(?:\?[^\s"'<>]*)?/gi
  ];

  for(const regex of patterns){
    const matches = html.match(regex) || [];
    for(let u of matches){
      u = deSlash(u);
      out.push({
        file: cleanUrl(u),
        label: /\.m3u8/i.test(u) ? 'HLS' : 'MP4'
      });
    }
  }

  const fileMatches = [...html.matchAll(/file\s*:\s*["']([^"']+)["']/gi)];
  for(const m of fileMatches){
    let u = deSlash(m[1]);
    u = absUrl(u, baseUrl);
    out.push({ file: cleanUrl(u), label: 'auto' });
  }

  const sourcesArray = [...html.matchAll(/sources\s*:\s*\[([\s\S]*?)\]/gi)];
  for(const block of sourcesArray){
    const inner = block[1];

    const srcMatches = [...inner.matchAll(/(?:file|src)\s*:\s*["']([^"']+)["']/gi)];
    const labelMatches = [...inner.matchAll(/label\s*:\s*["']([^"']+)["']/gi)];

    srcMatches.forEach((sm, idx) => {
      let u = deSlash(sm[1]);
      u = absUrl(u, baseUrl);
      out.push({
        file: cleanUrl(u),
        label: labelMatches[idx] ? labelMatches[idx][1] : 'auto'
      });
    });
  }

  return uniqueByFile(out).filter(x => /^https?:/i.test(x.file));
}

function parseIframeSrcs(html, baseUrl){
  const frames = [];

  const rx = /<iframe[^>]+src=["']([^"']+)["']/gi;
  let m;
  while((m = rx.exec(html)) !== null){
    frames.push(absUrl(deSlash(m[1]), baseUrl));
  }

  return [...new Set(frames)];
}

async function tryExtractFromPage(url){
  const normalizedUrl = normalizeLuluUrl(url);
  const html = decodeHtml(await proxyFetch(normalizedUrl));

  let found = parseDirectMediaUrls(html, normalizedUrl);
  if(found.length) return found;

  const frames = parseIframeSrcs(html, normalizedUrl);

  for(const frame of frames){
    try{
      const frameHtml = decodeHtml(await proxyFetch(frame));
      found = parseDirectMediaUrls(frameHtml, frame);
      if(found.length) return found;
    }catch(err){
      console.error('Frame parse failed:', err);
    }
  }

  return [];
}

async function extractLuluStream(link, buttonEl){
  try{
    if(buttonEl) buttonEl.textContent = 'Extracting...';

    currentSources = [];
    ensureVideoPlayerUI();
    setPlayerStatus(`Trying extraction...\n${link}`);

    let results = await tryExtractFromPage(link);

    if(!results.length){
      const normalized = normalizeLuluUrl(link);
      if(normalized !== link){
        results = await tryExtractFromPage(normalized);
      }
    }

    if(!results.length){
      setPlayerStatus('Extraction failed: no playable source found.');
      return;
    }

    currentSources = uniqueByFile(results).map((item, index) => ({
      file: item.file,
      label: item.label || `Source ${index + 1}`
    }));

    renderQualityButtons();
    playCustomStream(currentSources[0].file);
  }catch(err){
    console.error(err);
    ensureVideoPlayerUI();
    setPlayerStatus('Extraction failed with error. Check console for details.');
  }finally{
    if(buttonEl) buttonEl.textContent = 'Extract';
  }
}

/* =========================
   POSTS
========================= */
async function loadPosts(){
  posts.innerHTML = 'Loading…';

  try{
    const r = await fetch(`${API}&page=${page}&search=${encodeURIComponent(search)}`);
    totalPages = parseInt(r.headers.get('X-WP-TotalPages') || 1, 10);
    const data = await r.json();

    posts.innerHTML = '';

    data.forEach(p => {
      const img = p._embedded?.['wp:featuredmedia']?.[0]?.source_url || '';
      const c = document.createElement('div');
      c.className = 'card';
      c.innerHTML = img
        ? `<img class="thumb" src="${img}" alt=""><div class="title">${p.title.rendered}</div>`
        : `<div class="title">${p.title.rendered}</div>`;
      c.onclick = () => openPost(p);
      posts.appendChild(c);
    });

    renderPagination();
  }catch(err){
    console.error(err);
    posts.innerHTML = 'Failed to load posts.';
    pagination.innerHTML = '';
  }
}

function renderPagination(){
  pagination.innerHTML = '';

  const add = (text, fn, active=false) => {
    const b = document.createElement('button');
    b.textContent = text;
    if(active) b.classList.add('active');
    b.onclick = fn;
    pagination.appendChild(b);
  };

  add('Prev', () => {
    if(page > 1){
      page--;
      loadPosts();
    }
  });

  for(let i = Math.max(1, page - 2); i <= Math.min(totalPages, page + 2); i++){
    add(i, () => {
      page = i;
      loadPosts();
    }, i === page);
  }

  add('Next', () => {
    if(page < totalPages){
      page++;
      loadPosts();
    }
  });

  const input = document.createElement('input');
  input.type = 'number';
  input.min = 1;
  input.max = totalPages;
  pagination.appendChild(input);

  add('Go', () => {
    const v = parseInt(input.value, 10);
    if(v >= 1 && v <= totalPages){
      page = v;
      loadPosts();
    }
  });
}

function openPost(p){
  listView.style.display = 'none';
  postView.style.display = 'block';

  postThumb.src = p._embedded?.['wp:featuredmedia']?.[0]?.source_url || '';
  postTitle.innerHTML = p.title.rendered;

  const date = new Date(p.date);
  postMeta.textContent = `Posted on ${date.toDateString()} at ${date.toLocaleTimeString()}`;

  const cleanText = document.createElement('div');
  cleanText.innerHTML = decodeHtml(p.content.rendered);
  cleanText.querySelectorAll('iframe,img,script').forEach(e => e.remove());
  postContent.innerHTML = cleanText.innerHTML;

  postStreams.innerHTML = '';
  postPlayer.innerHTML = '';
  currentSources = [];
  destroyHls();

  const streamLinks = extractStreams(p.content.rendered);

  streamLinks.forEach(u => {
    const row = document.createElement('div');
    row.className = 'stream-row';

    const link = document.createElement('a');
    link.href = u;
    link.target = '_blank';
    link.rel = 'noopener noreferrer';
    link.textContent = u;
    row.appendChild(link);

    const playBtn = document.createElement('button');
    playBtn.className = 'play-btn';
    playBtn.textContent = `Play (${sourceName(u)})`;
    playBtn.onclick = async () => {
      playBtn.textContent = 'Loading...';
      const src = await resolveVideo(u);
      playBtn.textContent = `Play (${sourceName(u)})`;

      postPlayer.innerHTML = src
        ? `<div class="player-wrapper">
             <iframe src="${src}" allowfullscreen></iframe>
           </div>`
        : 'Failed';
    };
    row.appendChild(playBtn);

    if(isLuluLink(u)){
      const extractBtn = document.createElement('button');
      extractBtn.className = 'extract-btn';
      extractBtn.textContent = 'Extract';
      extractBtn.onclick = () => extractLuluStream(u, extractBtn);
      row.appendChild(extractBtn);
    }

    postStreams.appendChild(row);
  });

  postImages.innerHTML = '';
  extractImages(p.content.rendered).forEach(src => {
    const img = document.createElement('img');
    img.src = src;
    img.alt = '';
    postImages.appendChild(img);
  });
}

function backToList(){
  destroyHls();
  postView.style.display = 'none';
  listView.style.display = 'block';
}

searchInput.oninput = e => {
  search = e.target.value;
  page = 1;
  loadPosts();
};

loadPosts();
</script>

</body>
</html>
