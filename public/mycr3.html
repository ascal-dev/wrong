<!DOCTYPE html>
<html>
<head>

<body>

<header>
Ultra Fast Streaming Library
</header>

<div class="menu">

<button onclick="loadLatest()">Latest</button>

<input class="search" placeholder="Search..." onkeyup="searchPosts(this.value)">

<div id="categories"></div>

</div>

<div id="posts" class="grid"></div>

<div id="postPage"></div>

<script>

const API="https://ddose007.info.in/wp-json/wp/v2"

let cachePosts=[]
let streamCache={}

init()

async function init(){

await loadCategories()
await loadLatest()

}

/* categories */

async function loadCategories(){

let res=await fetch(API+"/categories")
let data=await res.json()

let html=""

data.forEach(c=>{
html+=`<button onclick="loadPosts(${c.id})">${c.name}</button>`
})

document.getElementById("categories").innerHTML=html

}

/* latest posts */

async function loadLatest(){

let res=await fetch(API+"/posts?_embed&per_page=50")
let posts=await res.json()

cachePosts=posts

renderPosts(posts)

}

/* category posts */

async function loadPosts(id){

let res=await fetch(API+"/posts?categories="+id+"&_embed&per_page=50")
let posts=await res.json()

cachePosts=posts

renderPosts(posts)

}

/* search */

function searchPosts(q){

q=q.toLowerCase()

let filtered=cachePosts.filter(p=>p.title.rendered.toLowerCase().includes(q))

renderPosts(filtered)

}

/* render grid */

function renderPosts(posts){

document.getElementById("postPage").style.display="none"
document.getElementById("posts").style.display="grid"

let html=""

posts.forEach(p=>{

let img=""

if(p._embedded && p._embedded["wp:featuredmedia"]){
img=p._embedded["wp:featuredmedia"][0].source_url
}

html+=`

<div class="card" onclick="openPost(${p.id})">

<img src="${img}">

<h3>${p.title.rendered}</h3>

</div>

`

})

document.getElementById("posts").innerHTML=html

}

/* open post */

async function openPost(id){

let res=await fetch(API+"/posts/"+id+"?_embed")
let post=await res.json()

let img=""

if(post._embedded && post._embedded["wp:featuredmedia"]){
img=post._embedded["wp:featuredmedia"][0].source_url
}

document.getElementById("posts").style.display="none"
document.getElementById("postPage").style.display="block"

let content=post.content.rendered

let streams=extractStreams(content)

let playerHTML=""

if(streams.length>0){

playerHTML=`

<div class="playerBox">

<video id="player" controls></video>

<div id="streamButtons"></div>

</div>

`

}

document.getElementById("postPage").innerHTML=`

<button class="back" onclick="back()">Back</button>

<img class="poster" src="${img}">

<h2>${post.title.rendered}</h2>

<div class="date">${new Date(post.date).toLocaleString()}</div>

${playerHTML}

<div class="content">${content}</div>

`

if(streams.length>0){

renderStreamButtons(streams)

}

}

/* extract streams */

function extractStreams(html){

let urls=[]

let regex=/https?:\/\/[^"' ]+\.(m3u8|mp4)/g
let match

while((match=regex.exec(html))!==null){
urls.push(match[0])
}

let hostRegex=/https?:\/\/[^"' ]+(vidnest|luluvdoo|lulu)[^"' ]+/g

while((match=hostRegex.exec(html))!==null){
urls.push(match[0])
}

let iframeRegex=/<iframe[^>]+src="([^"]+)"/g

while((match=iframeRegex.exec(html))!==null){
urls.push(match[1])
}

return urls

}

/* stream buttons */

function renderStreamButtons(streams){

let html=""

streams.forEach((s,i)=>{

html+=`<button class="playbtn" onclick="playStream('${s}')">Play Stream ${i+1}</button>`

prefetchStream(s)

})

document.getElementById("streamButtons").innerHTML=html

}

/* prefetch extraction */

async function prefetchStream(url){

if(streamCache[url]) return

if(url.includes("vidnest") || url.includes("lulu")){

try{

let r=await fetch(url)
let t=await r.text()

let m=t.match(/file\s*:\s*"(https:[^"]+)"/)

if(m){
streamCache[url]=m[1]
}

}catch(e){}

}

}

/* play stream */

async function playStream(url){

let player=document.getElementById("player")

if(streamCache[url]){
url=streamCache[url]
}

if(url.includes("vidnest") || url.includes("lulu")){

let res=await fetch(url)
let text=await res.text()

let match=text.match(/file\s*:\s*"(https:[^"]+)"/)

if(match){
url=match[1]
}

}

/* HLS support */

if(url.includes(".m3u8")){

if(Hls.isSupported()){

let hls=new Hls()
hls.loadSource(url)
hls.attachMedia(player)
hls.on(Hls.Events.MANIFEST_PARSED,function(){
player.play()
})

}else{

player.src=url
player.play()

}

}else{

player.src=url
player.play()

}

}

/* back */

function back(){

document.getElementById("postPage").style.display="none"
document.getElementById("posts").style.display="grid"

}

</script>

</body>

</html>
