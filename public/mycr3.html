<!DOCTYPE html>
<html>

<head>

<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Streaming Library</title>

<style>

body{
margin:0;
font-family:Arial;
background:#0b0b0b;
color:white;
}

header{
background:black;
padding:15px;
text-align:center;
font-size:22px;
position:relative;
}

.search-container{
position:absolute;
top:50%;
right:15px;
transform:translateY(-50%);
display:flex;
gap:5px;
}

.search-container input{
padding:8px 12px;
border:none;
border-radius:4px;
background:#333;
color:white;
width:200px;
}

.search-container button{
padding:8px 12px;
background:#e50914;
border:none;
color:white;
border-radius:4px;
cursor:pointer;
}

.menu{
display:flex;
flex-wrap:wrap;
gap:10px;
padding:10px;
justify-content:center;
background:#111;
align-items:center;
}

.sort-filter{
display:flex;
gap:10px;
align-items:center;
flex-wrap:wrap;
}

.sort-filter select{
padding:8px;
background:#333;
color:white;
border:none;
border-radius:4px;
}

.view-toggle{
display:flex;
gap:5px;
}

.view-toggle button{
padding:8px 12px;
background:#555;
border:none;
color:white;
border-radius:4px;
cursor:pointer;
}

.view-toggle button.active{
background:#e50914;
}

.menu button{
padding:8px 14px;
background:#e50914;
border:none;
color:white;
border-radius:4px;
cursor:pointer;
}

.menu button.active{
background:#ff6b6b;
}

.category-btn{
background:#555 !important;
}

.category-btn.active{
background:#e50914 !important;
}

.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(180px,1fr));
gap:15px;
padding:15px;
}

.list{
display:flex;
flex-direction:column;
gap:10px;
padding:15px;
}

.list .card{
display:flex;
background:#1a1a1a;
border-radius:10px;
overflow:hidden;
cursor:pointer;
padding:10px;
}

.list .card img{
width:120px;
height:90px;
object-fit:cover;
margin-right:15px;
}

.list .card h3{
font-size:16px;
margin:0;
flex:1;
}

.compact{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(140px,1fr));
gap:10px;
padding:15px;
}

.compact .card{
background:#1a1a1a;
border-radius:8px;
overflow:hidden;
cursor:pointer;
}

.compact .card img{
width:100%;
height:120px;
object-fit:cover;
}

.compact .card h3{
font-size:12px;
padding:5px;
}

.card{
background:#1a1a1a;
border-radius:10px;
overflow:hidden;
cursor:pointer;
}

.card img{
width:100%;
height:250px;
object-fit:cover;
}

.card h3{
font-size:15px;
padding:10px;
}

#postPage{
display:none;
padding:20px;
max-width:900px;
margin:auto;
}

.poster{
width:100%;
max-width:500px;
display:block;
margin:auto;
}

.playerBox{
margin-top:20px;
background:black;
padding:10px;
border-radius:10px;
}

video{
width:100%;
max-height:500px;
background:black;
}

.playbtn{
margin-top:10px;
padding:8px 15px;
background:#e50914;
border:none;
color:white;
cursor:pointer;
}

.extractbtn{
background:#2196F3;
margin-left:10px;
}

.linkBox{
background:#1a1a1a;
padding:10px;
margin-top:10px;
border-radius:6px;
}

.pagination{
display:flex;
justify-content:center;
align-items:center;
gap:10px;
padding:10px;
background:#111;
margin:10px 0;
}

.pagination button{
padding:8px 14px;
background:#e50914;
border:none;
color:white;
border-radius:4px;
cursor:pointer;
}

.pagination input{
width:60px;
padding:5px;
text-align:center;
}

@media (max-width: 768px) {
.search-container {
position: static;
transform: none;
margin-top: 10px;
width: 100%;
justify-content: center;
}
.search-container input {
width: 70%;
}
.menu {
flex-direction: column;
gap: 15px;
}
.sort-filter {
justify-content: center;
}
.grid {
grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
gap: 10px;
}
.list .card {
flex-direction: column;
text-align: center;
}
.list .card img {
width: 100%;
height: 150px;
margin-right: 0;
margin-bottom: 10px;
}
.video-controls-mobile {
display: flex;
justify-content: space-around;
padding: 10px;
background: #111;
position: fixed;
bottom: 0;
left: 0;
right: 0;
z-index: 1000;
}
}

</style>

</head>

<body>

<header>Streaming Library
<div class="search-container">
<input type="text" id="searchInput" placeholder="Search videos..." onkeypress="if(event.key==='Enter') performSearch()">
<button onclick="performSearch()">Search</button>
</div>
</header>

<div class="menu">

<button onclick="resetFilters()">Latest</button>

<div id="categories"></div>

<div class="sort-filter">
<select id="sortSelect" onchange="changeSort()">
<option value="date">Sort by Date</option>
<option value="title">Sort by Title</option>
<option value="popularity">Sort by Popularity</option>
</select>

<div class="view-toggle">
<button onclick="setView('grid')" class="active" id="gridBtn">Grid</button>
<button onclick="setView('list')" id="listBtn">List</button>
<button onclick="setView('compact')" id="compactBtn">Compact</button>
</div>
</div>

</div>

<div id="paginationTop"></div>

<div id="loading" style="display:none;text-align:center;padding:20px;color:#e50914;">Loading...</div>

<div id="posts" class="grid"></div>

<div id="paginationBottom"></div>

<div id="postPage"></div>

<script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>

<script>

const API="https://ddose007.info.in/wp-json/wp/v2"
const PROXY="https://allinone.godess.workers.dev/?url="

let currentSources=[]
let hlsInstance=null

let currentPage=1
let totalPages=1
let currentCategory=null
let currentSort='date'
let currentView='grid'
let currentSearch=''
let selectedCategories=[]

console.log("APP STARTED")

loadCategories()
loadFilteredPosts()

/* ---------------- PROXY FETCH ---------------- */

async function proxyFetch(url){

console.log("Proxy fetch:",url)

let res=await fetch(PROXY+encodeURIComponent(url))

let text=await res.text()

return text

}

/* ---------------- REDIRECT FOLLOWER ---------------- */

async function followRedirect(url){

console.log("Redirect start:",url)

let final=url

for(let i=0;i<6;i++){

let r=await fetch(PROXY+encodeURIComponent(final),{
redirect:"follow"
})

console.log("Redirect step",i,"->",r.url)

if(r.url===final) break

final=r.url

}

console.log("Final stream:",final)

return final

}

/* ---------------- CATEGORIES ---------------- */

async function loadCategories(){

let res=await fetch(API+"/categories")
let data=await res.json()

let html=""

data.forEach(c=>{
html+=`<button onclick="toggleCategory(${c.id})" class="category-btn" id="cat-${c.id}">${c.name}</button>`
})

document.getElementById("categories").innerHTML=html

}

/* ---------------- POSTS ---------------- */

async function loadLatest(page=1){

currentCategory=null
currentPage=page

document.getElementById("loading").style.display="block"
document.getElementById("posts").style.display="none"

let url = API+"/posts?_embed&per_page=12&page="+page

if(currentSearch) url += "&search="+encodeURIComponent(currentSearch)
if(selectedCategories.length > 0) url += "&categories="+selectedCategories.join(',')
if(currentSort === 'title') url += "&orderby=title&order=asc"
else if(currentSort === 'popularity') url += "&orderby=comment_count&order=desc"
else url += "&orderby=date&order=desc"

let res=await fetch(url)
totalPages=parseInt(res.headers.get('X-WP-TotalPages')) || 1
let posts=await res.json()

document.getElementById("loading").style.display="none"

renderPosts(posts)

}

async function loadPosts(id){

selectedCategories = [id]
currentCategory = id
currentPage = 1

loadFilteredPosts()

}

async function loadFilteredPosts(page = currentPage){

currentPage = page

document.getElementById("loading").style.display="block"
document.getElementById("posts").style.display="none"

let url = API+"/posts?_embed&per_page=12&page="+page

if(currentSearch) url += "&search="+encodeURIComponent(currentSearch)
if(selectedCategories.length > 0) url += "&categories="+selectedCategories.join(',')
if(currentSort === 'title') url += "&orderby=title&order=asc"
else if(currentSort === 'popularity') url += "&orderby=comment_count&order=desc"
else url += "&orderby=date&order=desc"

let res=await fetch(url)
totalPages=parseInt(res.headers.get('X-WP-TotalPages')) || 1
let posts=await res.json()

document.getElementById("loading").style.display="none"

renderPosts(posts)

}

function renderPosts(posts){

document.getElementById("postPage").style.display="none"
document.getElementById("posts").style.display="grid"
document.getElementById("posts").className = currentView

let html=""

posts.forEach(p=>{

let img=""

if(p._embedded && p._embedded["wp:featuredmedia"]){
img=p._embedded["wp:featuredmedia"][0].source_url
}

html+=`

<div class="card" onclick="openPost(${p.id})">

<img src="${img}" loading="lazy">
<h3>${p.title.rendered}</h3>

</div>

`

})

document.getElementById("posts").innerHTML=html

renderPagination()

}

/* ---------------- PAGINATION ---------------- */

function renderPagination(){

let html=`

<div class="pagination">

<button onclick="prevPage()" ${currentPage<=1?'disabled':''}>Previous</button>

<span>Page <input type="number" id="pageInput" value="${currentPage}" min="1" max="${totalPages}" onkeypress="if(event.key==='Enter') goToPage()"> of ${totalPages}</span>

<button onclick="goToPage()">Go</button>

<button onclick="nextPage()" ${currentPage>=totalPages?'disabled':''}>Next</button>

</div>

`

document.getElementById("paginationTop").innerHTML=html
document.getElementById("paginationBottom").innerHTML=html

}

function nextPage(){

if(currentPage < totalPages){

currentPage++

loadFilteredPosts(currentPage)

}

}

function prevPage(){

if(currentPage > 1){

currentPage--

loadFilteredPosts(currentPage)

}

}

function goToPage(){

let page=parseInt(document.getElementById("pageInput").value)

if(page >=1 && page <= totalPages){

currentPage=page

loadFilteredPosts(currentPage)

}

}

/* ---------------- SEARCH & FILTERS ---------------- */

function performSearch(){

currentSearch = document.getElementById("searchInput").value.trim()
currentPage = 1
loadFilteredPosts()

}

function changeSort(){

currentSort = document.getElementById("sortSelect").value
currentPage = 1
loadFilteredPosts()

}

function setView(view){

currentView = view
document.getElementById("posts").className = view

// Update active button
document.querySelectorAll('.view-toggle button').forEach(btn => btn.classList.remove('active'))
document.getElementById(view + 'Btn').classList.add('active')

}

function toggleCategory(id){

let index = selectedCategories.indexOf(id)
let btn = document.getElementById('cat-' + id)

if(index > -1){
selectedCategories.splice(index, 1)
btn.classList.remove('active')
}else{
selectedCategories.push(id)
btn.classList.add('active')
}

currentPage = 1
loadFilteredPosts()

}

function resetFilters(){

selectedCategories = []
currentSearch = ''
currentSort = 'date'
currentPage = 1

document.getElementById("searchInput").value = ''
document.getElementById("sortSelect").value = 'date'
document.querySelectorAll('.category-btn').forEach(btn => btn.classList.remove('active'))

loadFilteredPosts()

}

/* ---------------- MOBILE FEATURES ---------------- */

let touchStartX = 0
let touchStartY = 0
let isPulling = false

document.addEventListener('touchstart', function(e){
touchStartX = e.touches[0].clientX
touchStartY = e.touches[0].clientY
isPulling = window.scrollY === 0
})

document.addEventListener('touchmove', function(e){
if(!isPulling) return

let touchCurrentY = e.touches[0].clientY
let pullDistance = touchCurrentY - touchStartY

if(pullDistance > 50){
e.preventDefault()
// Add pull-to-refresh visual feedback here
}
})

document.addEventListener('touchend', function(e){
if(!isPulling) return

let touchEndX = e.changedTouches[0].clientX
let touchEndY = e.changedTouches[0].clientY
let deltaX = touchEndX - touchStartX
let deltaY = touchEndY - touchStartY

// Pull to refresh
if(deltaY > 100 && window.scrollY === 0){
loadFilteredPosts()
}

// Swipe navigation
if(Math.abs(deltaX) > 50 && Math.abs(deltaY) < 30){
if(deltaX > 0 && currentPage > 1){
prevPage()
}else if(deltaX < 0 && currentPage < totalPages){
nextPage()
}
}

isPulling = false
})

// Mobile video controls
function toggleFullscreen(){
let player = document.getElementById('player')
if(player.requestFullscreen){
player.requestFullscreen()
}else if(player.webkitRequestFullscreen){
player.webkitRequestFullscreen()
}
}

// Show mobile controls on mobile devices
if(window.innerWidth <= 768){
document.getElementById('mobileControls').style.display = 'flex'
}

/* ---------------- OPEN POST ---------------- */

async function openPost(id){

let res=await fetch(API+"/posts/"+id+"?_embed")
let post=await res.json()

let img=""

if(post._embedded && post._embedded["wp:featuredmedia"]){
img=post._embedded["wp:featuredmedia"][0].source_url
}

document.getElementById("posts").style.display="none"
document.getElementById("postPage").style.display="block"

document.getElementById("paginationTop").style.display="none"
document.getElementById("paginationBottom").style.display="none"

let content=post.content.rendered

let links=extractLinks(content)

let linkHTML=""

links.forEach(l=>{

if(isDownloadHost(l)) return

linkHTML+=`

<div class="linkBox">

${l}

<button class="extractbtn" onclick="extractStream('${l}')">
Extract
</button>

</div>

`

})

document.getElementById("postPage").innerHTML=`

<button onclick="back()">Back</button>

<img class="poster" src="${img}">

<h2>${post.title.rendered}</h2>

<div class="playerBox">

<video id="player" controls></video>

<div id="qualityBox"></div>

</div>

<div class="video-controls-mobile" id="mobileControls" style="display:none;">
<button onclick="player.play()">▶️</button>
<button onclick="player.pause()">⏸️</button>
<button onclick="player.currentTime -= 10">⏪</button>
<button onclick="player.currentTime += 10">⏩</button>
<button onclick="toggleFullscreen()">⛶</button>
</div>

<h3>Links</h3>

${linkHTML}

`

}

/* ---------------- LINK SCAN ---------------- */

function extractLinks(html){

let urls=new Set()

let regex=/(https?:\/\/[^"'<> ]+)/g
let match

while((match=regex.exec(html))!==null){

let url=match[1]

if(!isDownloadHost(url)){
urls.add(url)
}

}

console.log("Links found:",[...urls])

return [...urls]

}

/* ---------------- DOWNLOAD HOST FILTER ---------------- */

function isDownloadHost(url){

let blocked=[
"upfileas",
"uploadmall",
"dropgalaxy",
"freedl"
]

return blocked.some(h=>url.includes(h))

}

/* ---------------- STREAM EXTRACTION ---------------- */

async function extractStream(link){

console.log("Extracting:",link)

let html=await proxyFetch(link)

/* JWPLAYER HOSTS */

if(link.includes("vidnest") || link.includes("lulu") || link.includes("luluvdoo")){
extractJW(html)
return
}

/* STRCLOUD FAMILY */

if(link.includes("strcloud") || link.includes("advertape") || link.includes("tapeadsenjoyer")){
extractStrcloud(html)
return
}

console.log("Host not supported")

}

/* ---------------- JWPLAYER PARSER ---------------- */

function extractJW(html){

console.log("JW parser")

let fileRegex=/file\s*:\s*"([^"]+)"/g
let labelRegex=/label\s*:\s*"([^"]+)"/g

let files=[...html.matchAll(fileRegex)]
let labels=[...html.matchAll(labelRegex)]

currentSources=[]

for(let i=0;i<files.length;i++){

currentSources.push({
file:files[i][1],
label:labels[i] ? labels[i][1] : "auto"
})

}

console.log("Sources:",currentSources)

if(currentSources.length>0){

renderQualityButtons()
playStream(currentSources[0].file)

}

}

/* ---------------- STRCLOUD PARSER ---------------- */

async function extractStrcloud(html){

console.log("Strcloud extractor")

let match=html.match(/id="(?:ideoooolink|captchalink|norobotlink)"[^>]*>(.*?)</)

if(!match){
console.log("No redirect found")
return
}

let url=match[1]

url=url.replace(/&amp;/g,"&")

if(url.startsWith("//")) url="https:"+url
if(url.startsWith("/")) url="https:"+url

console.log("Extracted redirect:",url)

let final=await followRedirect(url)

playStream(final)

}

/* ---------------- PLAYER ---------------- */

function playStream(url){

console.log("Playing:",url)

let player=document.getElementById("player")

if(hlsInstance){
hlsInstance.destroy()
hlsInstance=null
}

if(url.includes(".m3u8")){

if(Hls.isSupported()){

hlsInstance=new Hls()

hlsInstance.loadSource(url)

hlsInstance.attachMedia(player)

}else{

player.src=url

}

}else{

player.src=url

}

player.play()

}

/* ---------------- QUALITY BUTTONS ---------------- */

function renderQualityButtons(){

let html=""

currentSources.forEach(s=>{
html+=`<button class="playbtn" onclick="playStream('${s.file}')">${s.label}</button>`
})

document.getElementById("qualityBox").innerHTML=html

}

/* ---------------- BACK ---------------- */

function back(){

document.getElementById("postPage").style.display="none"
document.getElementById("posts").style.display="grid"

document.getElementById("paginationTop").style.display="block"
document.getElementById("paginationBottom").style.display="block"

}

</script>

</body>

</html>
