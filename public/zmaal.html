<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Zmaal Latest Posts</title>
    <link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #0b1117;
            --bg2: #0f1721;
            --card: #111b25;
            --text: #f1f5f9;
            --text2: #94a3b8;
            --accent: #14b8a6;
            --accent2: #f97316;
            --border: rgba(148, 163, 184, 0.18);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Sora', system-ui, sans-serif;
            background: radial-gradient(1200px 600px at 10% -10%, rgba(20, 184, 166, 0.18), transparent 60%),
                radial-gradient(900px 500px at 90% 0%, rgba(249, 115, 22, 0.18), transparent 55%),
                var(--bg);
            color: var(--text);
            min-height: 100vh;
        }

        .wrap {
            max-width: 1200px;
            margin: 0 auto;
            padding: 28px 18px 60px;
        }

        header {
            display: flex;
            align-items: center;
            gap: 16px;
            flex-wrap: wrap;
            margin-bottom: 18px;
        }

        .brand {
            font-weight: 800;
            font-size: 1.6rem;
            letter-spacing: 0.4px;
        }

        .pill {
            padding: 6px 10px;
            border: 1px solid var(--border);
            border-radius: 999px;
            font-size: 12px;
            color: var(--text2);
            background: rgba(15, 23, 33, 0.6);
        }

        .toolbar {
            margin-left: auto;
            display: flex;
            align-items: center;
            gap: 8px;
            flex-wrap: wrap;
        }

        .search {
            min-width: 200px;
            padding: 10px 12px;
            border-radius: 10px;
            border: 1px solid var(--border);
            background: var(--bg2);
            color: var(--text);
            font-size: 13px;
        }

        .search::placeholder {
            color: #64748b;
        }

        .btn {
            background: var(--bg2);
            color: var(--text);
            border: 1px solid var(--border);
            border-radius: 10px;
            padding: 10px 14px;
            font-size: 13px;
            cursor: pointer;
            transition: transform 0.2s ease, border 0.2s ease;
        }

        .btn:hover:not(:disabled) {
            transform: translateY(-1px);
            border-color: var(--accent);
        }

        .btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .page-info {
            color: var(--text2);
            font-size: 12px;
            min-width: 110px;
            text-align: center;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(230px, 1fr));
            gap: 16px;
            margin-top: 10px;
        }

        .card {
            background: linear-gradient(180deg, rgba(17, 27, 37, 0.9), rgba(9, 15, 23, 0.9));
            border: 1px solid var(--border);
            border-radius: 16px;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            min-height: 320px;
        }

        .thumb {
            width: 100%;
            height: 160px;
            background: #0b121a;
            display: block;
            object-fit: cover;
        }

        .card-body {
            padding: 14px 14px 12px;
            display: flex;
            flex-direction: column;
            gap: 10px;
            flex: 1;
        }

        .title {
            font-size: 14px;
            line-height: 1.4;
            font-weight: 600;
        }

        .meta {
            color: var(--text2);
            font-size: 11px;
        }

        .actions {
            margin-top: auto;
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
        }

        .link-btn {
            text-decoration: none;
            color: #0b1117;
            background: var(--accent);
            padding: 8px 10px;
            border-radius: 10px;
            font-size: 12px;
            font-weight: 600;
            border: 1px solid rgba(0, 0, 0, 0.15);
        }

        .ghost-btn {
            text-decoration: none;
            color: var(--text);
            background: transparent;
            border: 1px solid var(--border);
            padding: 8px 10px;
            border-radius: 10px;
            font-size: 12px;
        }

        .status {
            margin: 20px 0;
            padding: 18px;
            border-radius: 14px;
            background: rgba(15, 23, 33, 0.7);
            border: 1px dashed var(--border);
            color: var(--text2);
        }

        .spinner {
            width: 26px;
            height: 26px;
            border: 3px solid rgba(148, 163, 184, 0.2);
            border-top-color: var(--accent2);
            border-radius: 50%;
            animation: spin 0.9s linear infinite;
            display: inline-block;
            vertical-align: middle;
            margin-right: 8px;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        footer {
            margin-top: 24px;
            color: var(--text2);
            font-size: 12px;
            text-align: center;
        }

        /* Player Styles */
        .player {
            position: fixed;
            inset: 0;
            background: rgba(5, 10, 14, 0.92);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 100;
            padding: 20px;
        }

        .player.show { display: flex; }

        .player-card {
            width: min(1000px, 100%);
            background: var(--bg2);
            border: 1px solid var(--border);
            border-radius: 18px;
            overflow: hidden;
            box-shadow: 0 30px 80px rgba(0, 0, 0, 0.8);
        }

        .player-header {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 12px 16px;
            border-bottom: 1px solid var(--border);
        }

        .player-title {
            font-size: 14px;
            font-weight: 600;
            flex: 1;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .player-close {
            background: #ef4444;
            border: none;
            color: white;
            padding: 6px 14px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 12px;
            font-weight: 700;
        }

        .player-body {
            position: relative;
            background: #000;
            aspect-ratio: 16 / 9;
        }

        .player-body video {
            width: 100%;
            height: 100%;
            display: block;
        }

        @media (max-width: 640px) {
            .grid { grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); }
            .thumb { height: 120px; }
            .toolbar { justify-content: center; margin-top: 10px; width: 100%; }
        }
    </style>
</head>

<body>
    <div class="wrap">
        <header>
            <div class="brand">Zmaal Latest</div>
            <div class="pill">Aggressive Extraction v2</div>
            <div class="toolbar">
                <input id="searchInput" class="search" type="text" placeholder="Search posts..." />
                <button class="btn" id="searchBtn">Search</button>
                <button class="btn" id="clearBtn">Clear</button>
                <input id="pageInput" class="search" type="number" min="1" placeholder="Page" style="max-width:80px;" />
                <button class="btn" id="goBtn">Go</button>
                <button class="btn" id="prevBtn">Prev</button>
                <div class="page-info" id="pageInfo">Page 1</div>
                <button class="btn" id="nextBtn">Next</button>
            </div>
        </header>

        <div id="status" class="status" style="display:none;"></div>
        <div class="grid" id="grid"></div>

        <footer>Direct Stream Extractor &bull; 2026</footer>
    </div>

    <div class="player" id="player">
        <div class="player-card">
            <div class="player-header">
                <div class="player-title" id="playerTitle">Loading Video...</div>
                <button class="player-close" id="playerClose">CLOSE</button>
            </div>
            <div class="player-body">
                <video id="playerVideo" preload="auto" controls playsinline></video>
            </div>
        </div>
    </div>

    <script>
        const grid = document.getElementById('grid');
        const statusEl = document.getElementById('status');
        const prevBtn = document.getElementById('prevBtn');
        const nextBtn = document.getElementById('nextBtn');
        const pageInfo = document.getElementById('pageInfo');
        const searchInput = document.getElementById('searchInput');
        const searchBtn = document.getElementById('searchBtn');
        const clearBtn = document.getElementById('clearBtn');
        const pageInput = document.getElementById('pageInput');
        const goBtn = document.getElementById('goBtn');
        const player = document.getElementById('player');
        const playerVideo = document.getElementById('playerVideo');
        const playerTitle = document.getElementById('playerTitle');
        const playerClose = document.getElementById('playerClose');

        const state = {
            page: 1,
            perPage: 12,
            totalPages: 1,
            loading: false,
            query: ''
        };

        const EXTERNAL_CORS_PROXY = 'https://zmaal.godess.workers.dev/?url=';

        // --- UTILITIES ---
        function decodeHtml(html) {
            const txt = document.createElement('textarea');
            txt.innerHTML = html;
            return txt.value;
        }

        function safeDecode(url) {
            try { return decodeURIComponent(url); } catch(e) { return url; }
        }

        function showStatus(message, loading = false) {
            statusEl.style.display = 'block';
            statusEl.innerHTML = loading ? `<span class="spinner"></span>${message}` : message;
        }

        function hideStatus() {
            statusEl.style.display = 'none';
        }

        // --- EXTRACTION LOGIC (AGGRESSIVE) ---
        // --- EXTRACTION LOGIC (RAW ATTRIBUTE BASED) ---
async function getZmaalMP4(targetUrl) {
    try {
        const proxyUrl = EXTERNAL_CORS_PROXY + encodeURIComponent(targetUrl);
        const res = await fetch(proxyUrl);
        if (!res.ok) throw new Error("Proxy fetch failed");
        
        const htmlText = await res.text();
        const parser = new DOMParser();
        const doc = parser.parseFromString(htmlText, 'text/html');

        // Check Video Source First
        const videoSource = doc.querySelector('video#my-video source');
        if (videoSource) {
            const rawSrc = videoSource.getAttribute('src'); // Gets "Mohan%2520Chabhiwala" raw
            if (rawSrc) return rawSrc;
        }

        // Check Download Div Second
        const downloadLink = doc.querySelector('.video-download-btn-wrap a.video-download-btn');
        if (downloadLink) {
            const rawHref = downloadLink.getAttribute('href'); // Gets "Mohan%2520Chabhiwala" raw
            if (rawHref) return rawHref;
        }

        return null;
    } catch (err) {
        console.error("Extraction error:", err);
        return null;
    }
}

        // --- PLAYER & HISTORY CONTROL ---}

// 2. Player with Proxy -> Direct Fallback
function openPlayer(rawUrl, title) {
    playerTitle.textContent = title;
    
    const cleanedUrl = safeDecode(rawUrl);
    const proxiedUrl = EXTERNAL_CORS_PROXY + cleanedUrl;
    
    console.log("Attempting Proxy Stream:", proxiedUrl);
    
    playerVideo.src = proxiedUrl;
    player.classList.add('show');
    document.body.style.overflow = 'hidden';
    history.pushState({ playerOpen: true }, title, "");

    // --- FALLBACK LOGIC ---
    let fallbackTriggered = false;

    const handleError = () => {
        if (!fallbackTriggered) {
            fallbackTriggered = true;
            console.warn("Proxy failed. Falling back to Direct Link:", cleanedUrl);
            
            // Switch to direct URL without the worker proxy
            playerVideo.src = rawUrl;
            playerVideo.play().catch(e => console.error("Direct playback failed:", e));
            
            playerTitle.textContent = title + " (Direct Fallback)";
        }
    };

    // Trigger fallback if there is a network error or the video stalls/fails to load
    playerVideo.addEventListener('error', handleError, { once: true });

    // Optional: Trigger fallback if video stays in 'loading' state too long (5 seconds)
    const timeout = setTimeout(() => {
        if (playerVideo.readyState < 3 && !fallbackTriggered) { 
            handleError();
        }
    }, 5000);

    playerVideo.play().catch(() => {
        console.log("User interaction required for playback");
    });
    
    // Clean up listeners when closing
    playerClose.addEventListener('click', () => {
        clearTimeout(timeout);
        playerVideo.removeEventListener('error', handleError);
    }, { once: true });
}

        function closePlayer(isNavigating = false) {
            player.classList.remove('show');
            document.body.style.overflow = '';
            playerVideo.pause();
            playerVideo.removeAttribute('src');
            playerVideo.load();

            // If user clicked manual close, sync history
            if (!isNavigating && history.state?.playerOpen) {
                history.back();
            }
        }

        window.addEventListener('popstate', (e) => {
            if (!e.state?.playerOpen) {
                closePlayer(true);
            }
        });

        playerClose.addEventListener('click', () => closePlayer(false));
        player.addEventListener('click', (e) => { if (e.target === player) closePlayer(false); });

        // --- WORDPRESS LOADING ---
        async function loadPage(page) {
            if (state.loading) return;
            state.loading = true;
            showStatus('Loading content...', true);

            try {
                const params = new URLSearchParams({
                    per_page: state.perPage,
                    page: page,
                    _embed: '1'
                });
                if (state.query) params.set('search', state.query);

                const res = await fetch(`https://zmaal.online/wp-json/wp/v2/posts?${params.toString()}`);
                if (!res.ok) throw new Error("API Error");

                state.totalPages = parseInt(res.headers.get('X-WP-TotalPages') || '1', 10);
                state.page = page;

                const posts = await res.json();
                renderGrid(posts);
            } catch (err) {
                showStatus('Error loading posts.');
            } finally {
                state.loading = false;
                updateUI();
            }
        }

        function renderGrid(posts) {
            hideStatus();
            if (!posts.length) {
                grid.innerHTML = '<p style="padding:20px; color:var(--text2)">No results found.</p>';
                return;
            }

            grid.innerHTML = posts.map(p => {
                const title = decodeHtml(p.title?.rendered || 'No Title');
                const thumb = p._embedded?.['wp:featuredmedia']?.[0]?.source_url || 
                              p.yoast_head_json?.og_image?.[0]?.url || '';
                const postLink = p.link;
                const streamLink = p.acf?.link || p.meta?.link || p.link;

                return `
                <article class="card">
                    <img class="thumb" src="${thumb}" alt="thumb" loading="lazy" onerror="this.style.opacity='0'">
                    <div class="card-body">
                        <div class="title">${title}</div>
                        <div class="meta">${new Date(p.date).toLocaleDateString()}</div>
                        <div class="actions">
                            <button class="link-btn" data-url="${streamLink}" data-title="${title.replace(/"/g, '&quot;')}">Play Now</button>
                            <a class="ghost-btn" href="${postLink}" target="_blank">Source</a>
                        </div>
                    </div>
                </article>`;
            }).join('');

            // Attach event listeners to buttons
            grid.querySelectorAll('.link-btn').forEach(btn => {
                btn.addEventListener('click', async () => {
                    const url = btn.dataset.url;
                    const title = btn.dataset.title;
                    const oldText = btn.textContent;
                    
                    btn.textContent = 'Extracting...';
                    btn.disabled = true;

                    const mp4 = await getZmaalMP4(url);
                    if (mp4) {
                        openPlayer(mp4, title);
                    } else {
                        alert("Could not extract MP4. Direct source might be hidden or dead.");
                    }

                    btn.textContent = oldText;
                    btn.disabled = false;
                });
            });
        }

        function updateUI() {
            pageInfo.textContent = `Page ${state.page} of ${state.totalPages}`;
            prevBtn.disabled = state.page <= 1;
            nextBtn.disabled = state.page >= state.totalPages;
            pageInput.value = state.page;
        }

        // --- EVENT LISTENERS ---
        searchBtn.addEventListener('click', () => { state.query = searchInput.value; loadPage(1); });
        clearBtn.addEventListener('click', () => { searchInput.value = ''; state.query = ''; loadPage(1); });
        prevBtn.addEventListener('click', () => { if (state.page > 1) loadPage(state.page - 1); });
        nextBtn.addEventListener('click', () => { if (state.page < state.totalPages) loadPage(state.page + 1); });
        goBtn.addEventListener('click', () => { const p = parseInt(pageInput.value); if(p > 0 && p <= state.totalPages) loadPage(p); });

        // Init
        loadPage(1);
    </script>
</body>

</html>
