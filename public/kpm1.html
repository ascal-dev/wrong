<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>KPM | Premium Portal</title>
    <style>
        :root {
            --primary: #FF0032;
            --bg: #050505;
            --card-bg: #121212;
            --text: #ffffff;
            --text-dim: #888;
            --accent: #00ff00;
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        
        body {
            font-family: -apple-system, system-ui, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background: var(--bg);
            color: var(--text);
            margin: 0;
            padding: 0;
            user-select: none;
        }

        .icon { width: 16px; height: 16px; vertical-align: middle; fill: currentColor; }

        header {
            background: rgba(18, 18, 18, 0.95);
            backdrop-filter: blur(10px);
            padding: 12px;
            position: sticky;
            top: 0;
            z-index: 100;
            border-bottom: 1px solid #222;
        }

        .history-stack {
            font-size: 10px;
            color: var(--primary);
            text-transform: uppercase;
            letter-spacing: 1.5px;
            margin-bottom: 8px;
            font-weight: bold;
        }

        .controls {
            display: flex;
            gap: 6px;
            align-items: center;
        }

        input, button {
            background: #1e1e1e;
            border: 1px solid #333;
            color: white;
            padding: 8px 10px;
            border-radius: 6px;
            font-size: 12px;
            display: flex;
            align-items: center;
            gap: 4px;
        }

        .btn-main {
            background: var(--primary);
            border: none;
            font-weight: bold;
            cursor: pointer;
        }

        #search-input { flex-grow: 1; }

        .content-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 12px;
            padding: 12px;
            max-width: 1000px;
            margin: 0 auto;
        }

        .card {
            background: var(--card-bg);
            border-radius: 10px;
            overflow: hidden;
            border: 1px solid #222;
            position: relative;
            display: flex;
            flex-direction: column;
        }

        .thumb-container {
            width: 100%;
            aspect-ratio: 16/9;
            background: #000;
            position: relative;
        }

        .thumb-container img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .hd-badge {
            position: absolute;
            top: 5px;
            right: 5px;
            background: rgba(0,0,0,0.8);
            color: var(--accent);
            padding: 2px 5px;
            font-size: 8px;
            font-weight: bold;
            border: 1px solid var(--accent);
            border-radius: 3px;
            z-index: 2;
        }

        .cat-overlay {
            position: absolute;
            bottom: 0; left: 0; right: 0;
            background: linear-gradient(transparent, rgba(255, 0, 50, 0.95));
            color: white;
            padding: 15px 5px 5px;
            text-align: center;
            font-weight: bold;
            font-size: 12px;
        }

        .card-info { padding: 8px; flex-grow: 1; }

        .card-title {
            font-size: 12px;
            font-weight: 500;
            line-height: 1.3;
            margin-bottom: 8px;
            height: 32px;
            overflow: hidden;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
        }

        .upload-meta {
            font-size: 9px;
            color: var(--text-dim);
            border-top: 1px solid #222;
            padding-top: 6px;
            display: flex;
            justify-content: space-between;
        }

        .overlay {
            position: fixed;
            inset: 0;
            background: var(--bg);
            z-index: 1000;
            display: none;
            overflow-y: auto;
            padding: 20px;
        }

        #duration-badge {
            background: #1a1a1a;
            padding: 5px 10px;
            border-radius: 4px;
            font-size: 11px;
            color: var(--accent);
            border: 1px solid #333;
            margin: 10px 0;
            display: inline-block;
        }

        .pagination {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 8px;
            padding: 20px 10px;
        }

        .pg-num { width: 45px; text-align: center; background: #000; border: 1px solid var(--primary); color: white; }
    </style>
</head>
<body>

<svg style="display:none;">
    <symbol id="icon-latest" viewBox="0 0 24 24"><path d="M13 3l-2 5h5l-6 13 2-5h-5l6-13z"/></symbol>
    <symbol id="icon-cat" viewBox="0 0 24 24"><path d="M4 11h5V5H4v6zm0 7h5v-6H4v6zm6 0h5v-6h-5v6zm6 0h5v-6h-5v6zm-6-7h5V5h-5v6zm6-6v6h5V5h-5z"/></symbol>
    <symbol id="icon-search" viewBox="0 0 24 24"><path d="M15.5 14h-.79l-.28-.27A6.471 6.471 0 0 0 16 9.5 6.5 6.5 0 1 0 9.5 16c1.61 0 3.09-.59 4.23-1.57l.27.28v.79l5 4.99L20.49 19l-4.99-5zm-6 0C7.01 14 5 11.99 5 9.5S7.01 5 9.5 5 14 7.01 14 9.5 11.99 14 9.5 14z"/></symbol>
    <symbol id="icon-play" viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></symbol>
</svg>

<header>
    <div class="history-stack" id="stack-ui">HOME</div>
    <div class="controls">
        <button onclick="nav.toLatest()" style="background:#222;"><svg class="icon"><use href="#icon-latest"></use></svg> LATEST</button>
        <button onclick="nav.toCategories()" style="background:#222;"><svg class="icon"><use href="#icon-cat"></use></svg> CATS</button>
        <input type="text" id="search-input" placeholder="Search...">
        <button class="btn-main" onclick="nav.doSearch()"><svg class="icon"><use href="#icon-search"></use></svg> GO</button>
    </div>
</header>

<div class="pagination" id="pag-top"></div>
<main class="content-grid" id="display-engine"></main>
<footer class="pagination" id="pag-bottom"></footer>

<div id="player-view" class="overlay">
    <button class="btn-main" onclick="nav.back()">← BACK</button>
    <div class="video-box" style="max-width:800px; margin:20px auto;">
        <h2 id="video-title" style="font-size: 1.1rem; margin-bottom: 5px;"></h2>
        <div id="duration-badge" style="display: none;">LENGTH: Calculating...</div>
        <div id="extract-screen" style="text-align:center; padding:50px 20px; border:1px solid #333; border-radius:12px; background:#0a0a0a;">
            <p id="status-text" style="color:#888; margin-bottom:15px;">Ready to extract stream...</p>
            <button class="btn-main" id="btn-extract" style="padding:12px 30px; margin:0 auto;"><svg class="icon"><use href="#icon-play"></use></svg> EXTRACT LINK</button>
        </div>
        <div id="video-wrap" style="display:none; margin-top:15px;"><video id="html5-player" controls playsinline style="width:100%; border-radius:8px;"></video></div>
    </div>
</div>

<script>
const _A = "aHR0cHM6Ly9rb3JlYW5wb3JubW92aWUuY29tL3dwLWpzb24vd3AvdjI=";
const _API = () => atob(_A);
const _PROXY = "https://allinone.godess.workers.dev/?url=";

let state = { view: 'latest', page: 1, total: 1, catId: null, history: ['HOME'] };

window.onpopstate = (e) => {
    if (e.state) {
        state = e.state;
        document.getElementById('player-view').style.display = 'none';
        document.getElementById('html5-player').pause();
        render();
    }
};

const nav = {
    push: (ns) => { state = { ...state, ...ns }; history.pushState(state, ''); render(); },
    back: () => history.back(),
    toLatest: () => nav.push({ view: 'latest', page: 1, history: ['HOME'] }),
    toCategories: () => nav.push({ view: 'categories', page: 1, history: ['HOME', 'CATEGORIES'] }),
    doSearch: () => {
        const q = document.getElementById('search-input').value;
        if(q) nav.push({ view: 'search', query: q, page: 1, history: ['HOME', 'SEARCH: '+q] });
    },
    openPlayer: (p) => {
        const player = document.getElementById('html5-player');
        const badge = document.getElementById('duration-badge');
        document.getElementById('video-title').innerText = p.title.rendered;
        badge.style.display = 'none';
        document.getElementById('player-view').style.display = 'block';
        document.getElementById('video-wrap').style.display = 'none';
        document.getElementById('extract-screen').style.display = 'block';
        
        player.onloadedmetadata = () => {
            const m = Math.floor(player.duration / 60);
            badge.innerText = `LENGTH: ${Math.floor(m/60)}hr ${m%60}m ${Math.floor(player.duration%60)}s`;
            badge.style.display = 'inline-block';
        };

        document.getElementById('btn-extract').onclick = async function() {
            this.disabled = true; this.innerText = "EXTRACTING...";
            try {
                const res = await fetch(_PROXY + encodeURIComponent(p.link));
                const html = await res.text();
                const match = html.match(/<meta[^>]*itemprop=["']contentURL["'][^>]*content=["']([^"']+)["']/i);
                if (match && match[1]) {
                    player.src = match[1];
                    document.getElementById('extract-screen').style.display = 'none';
                    document.getElementById('video-wrap').style.display = 'block';
                    player.play();
                } else { alert("Link not found on page."); }
            } catch (e) { alert("Proxy Error."); this.disabled = false; }
        };
        history.pushState({view: 'player_open'}, '');
    }
};

async function render() {
    const grid = document.getElementById('display-engine');
    document.getElementById('stack-ui').innerText = state.history.join(' > ');
    grid.innerHTML = '<div style="grid-column:1/-1;text-align:center;padding:100px;">LOADING...</div>';

    if (state.view === 'categories') {
        const res = await fetch(`${_API()}/categories?per_page=50&hide_empty=true`);
        const cats = await res.json();
        const items = await Promise.all(cats.map(async (c) => {
            const pRes = await fetch(`${_API()}/posts?categories=${c.id}&per_page=1&_embed`);
            const pData = await pRes.json();
            const img = pData[0]?._embedded?.['wp:featuredmedia']?.[0]?.source_url || '';
            return `<div class="card" onclick="nav.push({view:'cat_posts', catId:${c.id}, history:['HOME', '${c.name}'], page:1})">
                <div class="thumb-container"><img src="${img}" loading="lazy"><div class="cat-overlay">${c.name.toUpperCase()} (${c.count})</div></div>
            </div>`;
        }));
        grid.innerHTML = items.join('');
        document.querySelectorAll('.pagination').forEach(el => el.innerHTML = '');
    } else {
        let url = `${_API()}/posts?per_page=16&page=${state.page}&_embed`;
        if (state.view === 'cat_posts') url += `&categories=${state.catId}`;
        if (state.view === 'search') url += `&search=${state.query}`;
        try {
            const res = await fetch(url);
            state.total = res.headers.get('X-WP-TotalPages') || 1;
            const posts = await res.json();
            grid.innerHTML = posts.map(p => {
                const dt = new Date(p.date);
                return `<div class="card" onclick='nav.openPlayer(${JSON.stringify(p).replace(/'/g, "&apos;")})'>
                    <div class="thumb-container"><span class="hd-badge">4K PREMIUM</span><img src="${p._embedded?.['wp:featuredmedia']?.[0]?.source_url || ''}" loading="lazy"></div>
                    <div class="card-info"><div class="card-title">${p.title.rendered}</div>
                    <div class="upload-meta"><span>📅 ${dt.toLocaleDateString()}</span><span>🕒 ${dt.toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'})}</span></div></div>
                </div>`;
            }).join('');
            renderPagination();
        } catch (e) { grid.innerHTML = 'Error Loading.'; }
    }
}

function renderPagination() {
    const h = `<button class="btn-main" onclick="changePage(-1)" ${state.page <= 1 ? 'disabled' : ''}>PREV</button>
        <span style="font-size:11px;">PAGE <b>${state.page}</b> / <b>${state.total}</b></span>
        <input type="number" class="pg-num" value="${state.page}" id="jump-in">
        <button class="btn-main" onclick="goJump()">GO</button>
        <button class="btn-main" onclick="changePage(1)" ${state.page >= state.total ? 'disabled' : ''}>NEXT</button>`;
    document.getElementById('pag-top').innerHTML = h; document.getElementById('pag-bottom').innerHTML = h;
}

function changePage(s) { state.page += s; render(); window.scrollTo(0,0); }
function goJump() { const v = parseInt(document.getElementById('jump-in').value); if (v >= 1 && v <= state.total) { state.page = v; render(); window.scrollTo(0,0); } }

render();
</script>
</body>
</html>
