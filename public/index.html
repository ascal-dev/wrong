<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>WP JSON Fast Blog</title>
<meta name="theme-color" content="#0f172a">

<style>
:root{
  --bg: #0f172a;
  --card: #1e2937;
  --text: #f1f5f9;
  --muted: #94a3b8;
  --primary: #3b82f6;
  --primary-hover: #60a5fa;
  --border: #334155;
}

*{
  box-sizing: border-box;
  margin: 0;
  padding: 0;
}

body{
  font-family: system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
  background: var(--bg);
  color: var(--text);
  line-height: 1.6;
  padding-bottom: 100px;
}

header{
  position: sticky;
  top: 0;
  z-index: 100;
  background: rgba(15, 23, 42, 0.95);
  backdrop-filter: blur(12px);
  border-bottom: 1px solid var(--border);
  padding: 16px 14px;
  box-shadow: 0 4px 20px rgba(0,0,0,0.3);
}

header > div {
  display: flex;
  flex-wrap: wrap;
  gap: 8px;
  margin-bottom: 14px;
}

header a{
  color: var(--muted);
  text-decoration: none;
  font-size: 13px;
  padding: 6px 12px;
  background: var(--card);
  border-radius: 999px;
  border: 1px solid var(--border);
  transition: all 0.3s ease;
}

header a:hover{
  background: var(--primary);
  color: white;
  border-color: var(--primary);
}

header input{
  width: 100%;
  padding: 14px 20px;
  border-radius: 9999px;
  border: 1px solid var(--border);
  background: var(--card);
  color: var(--text);
  font-size: 16px;
  outline: none;
  transition: all 0.3s ease;
}

header input:focus{
  border-color: var(--primary);
  box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.2);
}

main{
  max-width: 980px;
  margin: 0 auto;
  padding: 16px 12px;
}

/* Card Design */
.card{
  display: flex;
  gap: 16px;
  align-items: center;
  background: var(--card);
  border-radius: 20px;
  padding: 14px;
  margin-bottom: 18px;
  cursor: pointer;
  transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
  border: 1px solid var(--border);
  box-shadow: 0 4px 15px rgba(0,0,0,0.2);
}

.card:hover{
  transform: translateY(-6px);
  box-shadow: 0 20px 25px -5px rgba(0,0,0,0.3);
  border-color: var(--primary);
}

.thumb{
  width: 130px;
  height: 90px;
  object-fit: cover;
  border-radius: 16px;
  flex-shrink: 0;
  background: #1e2937;
  box-shadow: 0 4px 10px rgba(0,0,0,0.3);
}

.title{
  font-weight: 700;
  font-size: 17px;
  line-height: 1.4;
  margin-bottom: 6px;
}

.meta{
  font-size: 13px;
  color: var(--muted);
}

/* Single Post */
.single{
  background: var(--card);
  border-radius: 24px;
  padding: 24px;
  border: 1px solid var(--border);
  box-shadow: 0 10px 30px rgba(0,0,0,0.4);
}

.nav{
  margin-bottom: 20px;
}

.nav button{
  padding: 10px 20px;
  border-radius: 9999px;
  border: 1px solid var(--border);
  background: var(--card);
  color: var(--text);
  font-weight: 600;
  cursor: pointer;
  transition: all 0.3s;
}

.nav button:hover{
  background: var(--primary);
  color: white;
  border-color: var(--primary);
}

.single img{
  width: 100%;
  border-radius: 20px;
  margin: 20px 0;
  box-shadow: 0 10px 25px rgba(0,0,0,0.4);
}

.single h1{
  font-size: 28px;
  line-height: 1.3;
  margin: 16px 0 20px;
  font-weight: 800;
}

.video-link{
  display: flex;
  align-items: center;
  gap: 16px;
  padding: 16px;
  background: rgba(59, 130, 246, 0.1);
  border: 1px solid var(--primary);
  border-radius: 18px;
  margin: 18px 0;
  cursor: pointer;
  transition: all 0.3s;
}

.video-link:hover{
  background: rgba(59, 130, 246, 0.2);
  transform: scale(1.02);
}

.play{
  width: 52px;
  height: 52px;
  border-radius: 50%;
  background: var(--primary);
  color: white;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 22px;
  flex-shrink: 0;
  box-shadow: 0 4px 15px rgba(59, 130, 246, 0.4);
}

video{
  width: 100%;
  margin-top: 12px;
  border-radius: 18px;
  box-shadow: 0 8px 20px rgba(0,0,0,0.5);
}

/* Ad Box */
.ad-box{
  margin: 24px 0;
  border-radius: 20px;
  overflow: hidden;
  border: 1px solid var(--border);
}

/* Pagination */
.pagination{
  display: flex;
  flex-wrap: wrap;
  gap: 10px;
  justify-content: center;
  margin: 30px 0;
  align-items: center;
}

.pagination button,
.pagination input{
  padding: 12px 18px;
  border-radius: 9999px;
  border: 1px solid var(--border);
  background: var(--card);
  color: var(--text);
  cursor: pointer;
  font-size: 15px;
  transition: all 0.3s;
}

.pagination button:hover:not(:disabled){
  background: var(--primary);
  color: white;
  border-color: var(--primary);
}

.pagination input{
  width: 70px;
  text-align: center;
}

/* Responsive */
@media (max-width: 640px) {
  .card{
    flex-direction: column;
    align-items: flex-start;
    gap: 12px;
  }
  
  .thumb{
    width: 100%;
    height: 200px;
  }
  
  .single{
    padding: 18px;
  }
  
  .single h1{
    font-size: 24px;
  }
}

@media (max-width: 480px) {
  header > div {
    justify-content: center;
  }
  
  header a{
    font-size: 12px;
    padding: 5px 10px;
  }
}
</style>
</head>
<body>
<header>
  <div>

    <a href="./ddose007.xyz.html">ddose007.xyz</a>

    <a href="./mycr4.html">My creation 4</a>
    <a href="./newvideo.html">New Video</a>
    <a href="./newvideo2.html">New video 2</a>
    <a href="./kpm1.html">KPM 1</a>
    <a href="./kpm2.html">KPM 2</a>
    <a href="./ch.html">CH</a>
    <a href="./mp4.html">MP4</a>
    <a href="./vivamax.html">Vivamax</a>
    <a href="./ms.html">ms</a>
     <a href="./zmaal.html">ZMAAL</a>
    <a href="./iframe.html">IFRAME</a>
    <a href="./javhd.html">JAVHD</a>
    <a href="./hitmaal.html">Hitmaal</a>
    <a href="./player.html">Hitmaal Player</a>
    <a href="./camraja.html">Camraja</a>
    <a href="./all2.html">All Nice</a>
  </div>
  
  <input id="search" placeholder="Search posts...">
</header>

<main id="posts"></main>

<script>
/* CONFIG */
const API_BASE = 'https://leakemms.godess.workers.dev/?url=https://www.soniyabedi.in/blog/wp-json/wp/v2/posts?_embed';
const PER_PAGE = 10;
const MAIN_AD_URL = 'https://www.effectivegatecpm.com/udpve945?key=7cd66743658c606e293d255b9b789ef5';
const POPUNDER_SCRIPT = 'https://pl28772002.effectivegatecpm.com/8e/59/71/8e5971f333df02f76a99caef6bfba4e3.js';
const ACTION_LIMIT = 1;
let page = 1;
let totalPages = 1;
let search = '';
let actionCount = 0;
let popLoaded = false;
const posts = document.getElementById('posts');
window.history.scrollRestoration = "manual";

/* ---------------- SCROLL MEMORY ---------------- */
function saveScroll(){
  const state = history.state || {};
  state.scroll = window.scrollY;
  history.replaceState(state, '', location.href);
}
function restoreScroll(){
  const y = history.state?.scroll || 0;
  setTimeout(()=> window.scrollTo(0,y), 50);
}
window.addEventListener('scroll', saveScroll);

/* ---------------- BROWSER BLOCKER ---------------- */
async function checkBrowser() {
  try{
    const isBrave = navigator.brave && await navigator.brave.isBrave();
    const userAgent = navigator.userAgent.toLowerCase();
    const isUlla = userAgent.includes('ulla');
    if (isBrave || isUlla) {
      document.body.innerHTML = `<h1 style="text-align:center;padding:40px;color:red;">Access Denied</h1>`;
      window.stop();
      throw new Error("Blocked");
    }
  }catch(e){}
}

/* ---------------- ADS ---------------- */
function loadPopunder(){
  if(popLoaded) return;
  popLoaded = true;
  const s = document.createElement('script');
  s.src = POPUNDER_SCRIPT;
  s.async = true;
  document.body.appendChild(s);
}
function trackActionWithAd(){
  actionCount++;
  if(actionCount === 1) loadPopunder();
  if(actionCount % ACTION_LIMIT === 0) {
    window.open(MAIN_AD_URL, '_blank');
  }
}

/* ---------------- ROUTING ---------------- */
window.addEventListener('popstate', route);
function route(){
  checkBrowser().then(()=>{
    const q = new URLSearchParams(location.search);
    const postId = q.get('post');
    if(postId){
      loadSingle(postId, true);
    }else{
      page = Number(q.get('page')) || 1;
      search = q.get('search') || '';
      document.getElementById('search').value = search;
      loadPosts(true);
    }
  });
}

/* ---------------- HELPERS ---------------- */
async function getThumb(p){
  let thumb = p._embedded?.['wp:featuredmedia']?.[0]?.source_url;
  if(!thumb && p.featured_media){
    try{
      const r = await fetch(`https://www.soniyabedi.in/blog/wp-json/wp/v2/media/${p.featured_media}`);
      const data = await r.json();
      thumb = data.source_url;
    }catch(e){ thumb=''; }
  }
  return thumb || '';
}

/* ---------------- LOAD POSTS ---------------- */
async function loadPosts(fromHistory=false){
  posts.innerHTML='Loading…';
  const r = await fetch(`${API_BASE}&per_page=${PER_PAGE}&page=${page}&search=${encodeURIComponent(search)}`);
  totalPages = parseInt(r.headers.get('X-WP-TotalPages')||1);
  const d = await r.json();
  posts.innerHTML='';
  
  for(let i=0;i<d.length;i++){
    const p=d[i];
    const img=await getThumb(p);
    
    if(i%3===0){
      const ad=document.createElement('div');
      ad.className='ad-box';
      ad.innerHTML=`<iframe style="width:100%;height:280px;border:0" src="${MAIN_AD_URL}"></iframe>`;
      posts.appendChild(ad);
    }
    
    const c=document.createElement('div');
    c.className='card';
    c.innerHTML=img?
      `<img class="thumb" src="${img}"><div><div class="title">${p.title.rendered}</div><div class="meta">${new Date(p.date).toLocaleString()}</div></div>`
      :`<div class="title">${p.title.rendered}</div>`;
    c.onclick=()=>{
      trackActionWithAd();
      saveScroll();
      openPost(p.id);
    };
    posts.appendChild(c);
  }
  renderPagination();
  if(fromHistory) restoreScroll();
  else window.scrollTo(0,0);
}

/* ---------------- PAGINATION ---------------- */
function renderPagination(){
  const container=document.createElement('div');
  container.className='pagination';
  const prev=document.createElement('button');
  prev.textContent='Prev';
  prev.disabled=page<=1;
  prev.onclick=()=>{
    trackActionWithAd();
    saveScroll();
    if(page>1){page--;pushListState();loadPosts();}
  };
  
  const next=document.createElement('button');
  next.textContent='Next';
  next.disabled=page>=totalPages;
  next.onclick=()=>{
    trackActionWithAd();
    saveScroll();
    if(page<totalPages){page++;pushListState();loadPosts();}
  };
  
  const input=document.createElement('input');
  input.type='number';
  input.value=page;
  const go=document.createElement('button');
  go.textContent='Go';
  go.onclick=()=>{
    trackActionWithAd();
    saveScroll();
    const val=parseInt(input.value);
    if(val>=1&&val<=totalPages){page=val;pushListState();loadPosts();}
  };
  
  container.append(prev,next,input,go);
  posts.appendChild(container);
}

function pushListState(){
  history.pushState(
    {type:'list',page,search,scroll:0},
    '',
    `?page=${page}&search=${encodeURIComponent(search)}`
  );
}

/* ---------------- SINGLE POST ---------------- */
function openPost(id){
  history.pushState(
    {type:'post',id,scroll:0},
    '',
    `?post=${id}`
  );
  loadSingle(id);
}

async function loadSingle(id,fromHistory=false){
  const r=await fetch(`${API_BASE}&include=${id}`);
  const data=await r.json();
  const p=data[0];
  const img=await getThumb(p);
  const firstPara=p.content.rendered.match(/<p>[\s\S]*?<\/p>/i)?.[0]||'';
  const mp4s=[...p.content.rendered.matchAll(/https?:\/\/[^\s"'<>]+\.mp4/gi)].map(m=>m[0]);
  
  posts.innerHTML=`
    <div class="single">
      <div class="nav"><button id="back-btn">← Back</button></div>
      <div class="ad-box"><iframe style="width:100%;height:280px;border:0" src="${MAIN_AD_URL}"></iframe></div>
      ${img?`<img src="${img}">`:''}
      <h1>${p.title.rendered}</h1>
      <div class="ad-box"><iframe style="width:100%;height:280px;border:0" src="${MAIN_AD_URL}"></iframe></div>
      ${firstPara}
      <div class="ad-box"><iframe style="width:100%;height:280px;border:0" src="${MAIN_AD_URL}"></iframe></div>
      ${mp4s.map((u,i)=>`
        <div class="video-link" id="vid-btn-${i}">
          <div class="play">▶</div>
          <div>Viral Video ${i+1}</div>
        </div>
        <div id="player-${i}"></div>
      `).join('')}
    </div>
  `;
  
  document.getElementById('back-btn').onclick=()=>{
    trackActionWithAd();
    saveScroll();
    history.back();
  };
  
  mp4s.forEach((u,i)=>{
    document.getElementById(`vid-btn-${i}`).onclick=()=>{
      trackActionWithAd();
      document.getElementById(`player-${i}`).innerHTML=
        `<video controls autoplay src="${u}"></video>`;
    };
  });
  
  if(fromHistory) restoreScroll();
  else window.scrollTo(0,0);
}

/* ---------------- SEARCH ---------------- */
document.getElementById('search').addEventListener('keyup',(e)=>{
  if(e.key==='Enter'){
    trackActionWithAd();
    search=e.target.value;
    page=1;
    pushListState();
    loadPosts();
  }
});

/* ---------------- INIT ---------------- */
if(!history.state){
  history.replaceState({type:'list',page,search,scroll:0},'',location.href);
}
route();
</script>
</body>
