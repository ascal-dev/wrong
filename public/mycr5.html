<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Series Viewer with Latest Posts</title>
<style>
body{background:#0e0e0e;color:white;font-family:Arial;margin:0;padding:20px;}
h1{text-align:center;margin-bottom:20px;}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:12px;}
.card{background:#1c1c1c;border-radius:8px;overflow:hidden;cursor:pointer;transition:.2s;}
.card:hover{transform:scale(1.03);}
.card img{width:100%;height:120px;object-fit:cover;}
.card-title{padding:6px;text-align:center;font-size:13px;}
.meta{font-size:11px;opacity:.7;margin-top:2px;}
.back{margin-bottom:12px;}
button{background:#ff2c2c;border:none;padding:5px 10px;color:white;border-radius:4px;cursor:pointer;margin:2px;}
button:hover{background:#ff4d4d;}
@media (min-width: 768px){.grid{grid-template-columns:repeat(4,1fr);}}
@media (max-width: 767px){.grid{grid-template-columns:repeat(2,1fr);}}
video{width:100%;max-width:900px;margin-top:15px;background:black;border-radius:6px;}
</style>
</head>
<body>
<h1>Series Viewer with Latest Posts</h1>

<div id="pagination">
<button onclick="prevPage()">Prev</button>
<input id="pageInput" type="number" value="1">
<button onclick="goPage()">Go</button>
<button onclick="nextPage()">Next</button>
<button onclick="loadLatest()">Latest</button>
<span id="totalPages"></span>
</div>

<div id="mainGrid" class="grid"></div>
<div id="postDetail"></div>
<video id="player" controls></video>
<div id="videoInfo"></div>

<script>
const proxy="https://allinone.godess.workers.dev/?url=";
const SERIES_API="https://xmazaa.ac/wp-json/wp/v2/series";
const POSTS_API="https://xmazaa.ac/wp-json/wp/v2/posts?_embed&per_page=100";
let page=1,totalPages=1,latestMode=false;
const mainGrid=document.getElementById("mainGrid");
const postDetail=document.getElementById("postDetail");
const player=document.getElementById("player");
const videoInfo=document.getElementById("videoInfo");
const cacheSeries={},cachePosts={},cacheLatest={};

function proxyFetch(url){return fetch(proxy+encodeURIComponent(url));}

// Load series list
async function loadSeries(){
    latestMode=false;
    postDetail.innerHTML=""; player.src=""; videoInfo.innerHTML="";
    mainGrid.innerHTML="Loading series...";
    if(cacheSeries[page]){renderSeries(cacheSeries[page]);return;}
    const res=await proxyFetch(`${SERIES_API}?per_page=100&page=${page}`);
    totalPages=res.headers.get("X-WP-TotalPages")||1;
    document.getElementById("totalPages").innerText="/ "+totalPages;
    const data=await res.json();
    cacheSeries[page]=data;
    renderSeries(data);
}

// Render series with 2 posts each
async function renderSeries(seriesList){
    mainGrid.innerHTML="";
    for(let series of seriesList){
        let posts=[];
        if(cachePosts[series.id]) posts=cachePosts[series.id];
        else{
            const res=await proxyFetch(`${POSTS_API}&series=${series.id}`);
            posts=await res.json();
            cachePosts[series.id]=posts;
        }
        if(posts.length===0) continue;
        const seriesPoster=posts[0]._embedded?.["wp:featuredmedia"]?.[0]?.source_url || series.image || "";
        const div=document.createElement("div");
        div.className="card";
        div.innerHTML=`
<img src="${seriesPoster}">
<div class="card-title">${series.name || series.title?.rendered || "No Title"}</div>
<div class="meta">${posts.length} Episodes</div>
<hr style="border-color:#333;">
${posts.slice(0,2).map(p=>`<div class="card" onclick='showPostDetail(${JSON.stringify(p).replace(/'/g,"\\'")})'><img src="${p._embedded?.["wp:featuredmedia"]?.[0]?.source_url || ""}"><div class="card-title">${p.title.rendered}</div><div class="meta">${new Date(p.modified).toLocaleDateString()}</div></div>`).join('')}
`;
        mainGrid.appendChild(div);
    }
}

// Load latest posts
async function loadLatest(){
    latestMode=true;
    postDetail.innerHTML=""; player.src=""; videoInfo.innerHTML="";
    mainGrid.innerHTML="Loading latest posts...";
    if(cacheLatest[page]){renderLatest(cacheLatest[page]);return;}
    const res=await proxyFetch(`${POSTS_API}&page=${page}`);
    totalPages=res.headers.get("X-WP-TotalPages")||1;
    document.getElementById("totalPages").innerText="/ "+totalPages;
    const posts=await res.json();
    cacheLatest[page]=posts;
    renderLatest(posts);
}

// Render latest posts
function renderLatest(posts){
    mainGrid.innerHTML="";
    posts.forEach(p=>{
        const thumb=p._embedded?.["wp:featuredmedia"]?.[0]?.source_url || "";
        const div=document.createElement("div");
        div.className="card";
        div.innerHTML=`
<img src="${thumb}">
<div class="card-title">${p.title.rendered}</div>
<div class="meta">${new Date(p.modified).toLocaleDateString()}</div>
`;
        div.onclick=()=>showPostDetail(p);
        mainGrid.appendChild(div);
    });
}

// Show post detail with Extract & Play
function showPostDetail(post){
    mainGrid.innerHTML="";
    postDetail.innerHTML=`<div class="back"><button onclick="${latestMode?'loadLatest()':'loadSeries()'}">⬅ Back</button></div>`;
    player.src=""; videoInfo.innerHTML="";
    const poster=post._embedded?.["wp:featuredmedia"]?.[0]?.source_url || "";
    const updated=new Date(post.modified).toLocaleString();
    const content=post.content.rendered || "";
    const div=document.createElement("div");
    div.className="card";
    div.style.padding="10px";
    div.innerHTML=`
<img src="${poster}" style="width:100%;border-radius:6px;margin-bottom:10px;">
<h2>${post.title.rendered}</h2>
<div class="meta">Updated: ${updated}</div>
<div>${content}</div>
<button onclick='extractVideo("${post.link}")'>Extract & Play Video</button>
`;
    postDetail.appendChild(div);
}

// Aggressive video extraction
async function extractVideo(url){
    videoInfo.innerHTML="Extracting video...";
    try{
        const res=await fetch(proxy+encodeURIComponent(url));
        const html=await res.text();
        const parser=new DOMParser();
        const doc=parser.parseFromString(html,"text/html");
        let video="";

        const lazySources=doc.querySelectorAll(".xplayer-lazy-source");
        if(lazySources.length){
            for(let src of lazySources){
                const s=src.getAttribute("data-src");
                if(s && s.includes(".mp4")){video=s;break;}
            }
        }

        if(!video){
            const jsonScripts=doc.querySelectorAll('script[type="application/ld+json"]');
            for(let js of jsonScripts){
                try{
                    const data=JSON.parse(js.textContent);
                    if(data.contentUrl && data.contentUrl.includes(".mp4")){video=data.contentUrl;break;}
                    else if(data.embedUrl && data.embedUrl.includes(".mp4")){video=data.embedUrl;break;}
                }catch(e){}
            }
        }

        if(!video){
            const regex=html.match(/https?:\/\/[^"']+\.mp4/g);
            if(regex && regex.length>0){video=regex[0];}
        }

        if(video){
            player.src=video;
            player.load();
            player.play();
            videoInfo.innerHTML=`Streaming: <br>${video}`;
        } else {
            videoInfo.innerHTML="Video not found.";
            alert("Video not found for this post.");
        }

    } catch(e){
        console.error("Video fetch error",e);
        videoInfo.innerHTML="Failed to extract video.";
        alert("Failed to extract video.");
    }
}

// Pagination
function nextPage(){if(page<totalPages){page++;document.getElementById("pageInput").value=page;latestMode?loadLatest():loadSeries();}}
function prevPage(){if(page>1){page--;document.getElementById("pageInput").value=page;latestMode?loadLatest():loadSeries();}}
function goPage(){page=parseInt(document.getElementById("pageInput").value);if(page<1)page=1;if(page>totalPages)page=totalPages;latestMode?loadLatest():loadSeries();}

// Initial load
loadSeries();
</script>
</body>
</html>
