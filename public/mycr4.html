<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Series Viewer</title>

<style>

body{
background:#0e0e0e;
color:white;
font-family:Arial;
margin:0;
padding:20px
}

h1{text-align:center}

.grid{
display:grid;
grid-template-columns:repeat(auto-fill,minmax(160px,1fr));
gap:12px
}

.card{
background:#1c1c1c;
border-radius:8px;
overflow:hidden;
cursor:pointer;
transition:.2s
}

.card:hover{transform:scale(1.03)}

.card img{
width:100%;
height:auto;
max-height:240px;
object-fit:contain;
background:black
}

.card-title{
padding:6px;
text-align:center;
font-size:14px
}

.meta{
font-size:11px;
opacity:.7;
text-align:center;
margin-bottom:6px
}

button{
background:#ff2c2c;
border:none;
padding:6px 12px;
color:white;
border-radius:4px;
cursor:pointer;
margin:3px
}

button:hover{background:#ff4d4d}

.nav{
text-align:center;
margin:15px 0
}

video{
width:100%;
max-width:900px;
margin:20px auto;
display:block;
background:black;
border-radius:6px
}

.gallery img{
width:100%;
margin-top:10px;
border-radius:6px
}

</style>
</head>

<body>

<h1>Series Viewer</h1>

<div class="nav">
<button onclick="prevPage()">Prev</button>
<input id="pageInput" type="number" value="1" style="width:60px">
<button onclick="goPage()">Go</button>
<button onclick="nextPage()">Next</button>
</div>

<div id="mainGrid" class="grid"></div>
<div id="detail"></div>
<div id="playerContainer"></div>

<div class="nav">
<button onclick="prevPage()">Prev</button>
<button onclick="nextPage()">Next</button>
</div>

<script>

const proxy="https://allinone.godess.workers.dev/?url="

const SERIES_API="https://xmazaa.ac/wp-json/wp/v2/series"
const POSTS_API="https://xmazaa.ac/wp-json/wp/v2/posts"

let page=1
let totalPages=1

const grid=document.getElementById("mainGrid")
const detail=document.getElementById("detail")
const playerContainer=document.getElementById("playerContainer")

function proxyFetch(url){
return fetch(proxy+encodeURIComponent(url))
}

function extractNumber(title){

let numbers = title.match(/\d+/g)

if(!numbers) return 0

return parseInt(numbers[numbers.length-1])

}

async function loadSeries(){

grid.innerHTML="Loading series..."
detail.innerHTML=""
playerContainer.innerHTML=""

const res=await proxyFetch(`${SERIES_API}?per_page=100&page=${page}`)

totalPages=res.headers.get("X-WP-TotalPages")||1

const data=await res.json()

renderSeries(data.slice(0,24))

}

async function renderSeries(seriesList){

grid.innerHTML=""

for(let s of seriesList){

const posts=await getSeriesPosts(s.id)

if(posts.length===0) continue

const poster=posts[0]._embedded?.["wp:featuredmedia"]?.[0]?.source_url || ""

const div=document.createElement("div")

div.className="card"

div.innerHTML=`
<img src="${poster}">
<div class="card-title">${s.name}</div>
<div class="meta">${posts.length} Episodes</div>
`

div.onclick=()=>showSeriesEpisodes(s.id,s.name)

grid.appendChild(div)

}

}

async function getSeriesPosts(seriesId){

const res=await proxyFetch(`${POSTS_API}?series=${seriesId}&_embed&per_page=100`)

const posts=await res.json()

posts.sort((a,b)=>extractNumber(a.title.rendered)-extractNumber(b.title.rendered))

return posts

}

async function showSeriesEpisodes(seriesId,seriesName){

grid.innerHTML="Loading episodes..."
detail.innerHTML=""
playerContainer.innerHTML=""

const posts=await getSeriesPosts(seriesId)

grid.innerHTML=""

detail.innerHTML=`
<button onclick="loadSeries()">⬅ Back</button>
<h2>${seriesName}</h2>
`

posts.forEach(p=>{

const thumb=p._embedded?.["wp:featuredmedia"]?.[0]?.source_url || ""

const date=new Date(p.modified).toLocaleString()

const div=document.createElement("div")

div.className="card"

div.innerHTML=`
<img src="${thumb}">
<div class="card-title">${p.title.rendered}</div>
<div class="meta">${date}</div>
`

div.onclick=()=>showEpisodeDetail(p)

grid.appendChild(div)

})

}

async function showEpisodeDetail(post){

grid.innerHTML=""
playerContainer.innerHTML=""

const poster=post._embedded?.["wp:featuredmedia"]?.[0]?.source_url || ""
const updated=new Date(post.modified).toLocaleString()

detail.innerHTML=`

<button onclick="history.back()">⬅ Back</button>

<div class="card" style="padding:12px">

<img src="${poster}" style="width:100%;border-radius:6px">

<h2>${post.title.rendered}</h2>

<div class="meta">Uploaded: ${updated}</div>

<div>${post.content.rendered}</div>

<button onclick='extractVideo("${post.link}")'>Extract Video</button>

<div id="gallery" class="gallery"></div>

</div>

`

loadMediaImages(post)

}

async function loadMediaImages(post){

const gallery=document.getElementById("gallery")

gallery.innerHTML="Loading images..."

try{

const mediaLink=post._links["wp:featuredmedia"][0].href

const res=await proxyFetch(mediaLink)

const media=await res.json()

const html=media.description.rendered

const parser=new DOMParser()

const doc=parser.parseFromString(html,"text/html")

const links=doc.querySelectorAll("a")

gallery.innerHTML=""

links.forEach(a=>{

if(a.href.includes(".webp")){

const img=document.createElement("img")

img.src=a.href

gallery.appendChild(img)

}

})

}catch(e){

gallery.innerHTML="No images found"

}

}

async function extractVideo(url){

playerContainer.innerHTML="Extracting video..."

try{

const res=await fetch(proxy+encodeURIComponent(url))

const html=await res.text()

let video=""

const mp4=html.match(/https?:\/\/[^"' ]+\.mp4/g)

if(mp4) video=mp4[0]

if(video){

playerContainer.innerHTML=`

<video controls autoplay>
<source src="${video}" type="video/mp4">
</video>

<div style="text-align:center;margin-top:10px">
Streaming:<br>${video}
</div>
`

playerContainer.scrollIntoView({behavior:"smooth"})

}else{

playerContainer.innerHTML="Video not found"

}

}catch(e){

playerContainer.innerHTML="Extraction failed"

}

}

function nextPage(){

if(page<totalPages){
page++
document.getElementById("pageInput").value=page
loadSeries()
}

}

function prevPage(){

if(page>1){
page--
document.getElementById("pageInput").value=page
loadSeries()
}

}

function goPage(){

page=parseInt(document.getElementById("pageInput").value)

if(page<1) page=1

loadSeries()

}

loadSeries()

</script>

</body>
</html>
