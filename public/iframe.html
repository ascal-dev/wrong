<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Titan Recursive Player</title>
    <style>
        :root { --red: #e50914; --bg: #000; --panel: #141414; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body, html { margin: 0; padding: 0; height: 100%; background: var(--bg); font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; color: #fff; overflow: hidden; }
        
        /* Dashboard UI */
        #menu { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; padding: 20px; transition: opacity 0.3s; }
        .logo-container { text-align: center; margin-bottom: 40px; }
        .logo-container h1 { margin: 0; font-size: 3rem; letter-spacing: 4px; color: var(--red); text-shadow: 0 0 20px rgba(229, 9, 20, 0.5); }
        .logo-container p { color: #888; margin: 5px 0; font-size: 0.8rem; letter-spacing: 2px; }
        .search { width: 100%; max-width: 600px; display: flex; background: #111; border-radius: 50px; border: 1px solid #333; padding: 5px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        input { flex: 1; background: none; border: none; padding: 15px 25px; color: #fff; outline: none; font-size: 1rem; }
        .go { background: var(--red); color: #fff; border: none; padding: 0 35px; border-radius: 50px; font-weight: bold; cursor: pointer; transition: transform 0.2s; }
        .go:hover { transform: scale(1.05); background: #ff0f1b; }
        .quick-links { display: flex; gap: 15px; margin-top: 30px; flex-wrap: wrap; justify-content: center; }
        .btn-link { background: var(--panel); border: 1px solid #333; color: #ccc; padding: 12px 25px; border-radius: 8px; cursor: pointer; font-size: 0.9rem; transition: 0.3s; }
        .btn-link:hover { background: #222; border-color: var(--red); color: #fff; }

        /* Fullscreen Player */
        #player { display: none; position: fixed; inset: 0; z-index: 9999; background: #000; }
        .nav-bar { position: absolute; top: 0; width: 100%; padding: 15px 20px; display: flex; justify-content: space-between; z-index: 10001; background: linear-gradient(to bottom, rgba(0,0,0,0.8), transparent); pointer-events: none; }
        .nav-bar button { pointer-events: auto; background: rgba(0,0,0,0.5); border: 1px solid #444; color: #fff; padding: 8px 18px; border-radius: 4px; cursor: pointer; font-size: 0.8rem; backdrop-filter: blur(5px); }
        .exit-btn { background: var(--red) !important; border: none !important; font-weight: bold; }
        .frame-wrapper { position: relative; width: 100%; height: 100%; overflow: hidden; }
        iframe { width: 100%; height: 100%; border: none; background: #000; }
        #loader { position: absolute; top: 50%; left: 50%; transform: translate(-50%,-50%); width: 50px; height: 50px; border: 4px solid #222; border-top-color: var(--red); border-radius: 50%; animation: spin 1s linear infinite; z-index: 10002; display: none; }
        @keyframes spin { to { transform: translate(-50%,-50%) rotate(360deg); } }
    </style>
</head>
<body>
    <div id="menu">
        <div class="logo-container">
            <h1>TITAN</h1>
            <p>ADVANCED RECURSIVE MIDDLE-MAN</p>
        </div>
        <div class="search">
            <input type="text" id="url-in" placeholder="Paste streaming URL here..." onkeypress="if(event.key==='Enter') launchCustom()">
            <button class="go" onclick="launchCustom()">LAUNCH</button>
        </div>
        <div class="quick-links">
            <button class="btn-link" onclick="launch('https://www.wetsins.com/')">WETSINS</button>
            <button class="btn-link" onclick="launch('https://pornrape.tv/')">PORNRAPE</button>
            <button class="btn-link" onclick="launch('https://www.wetsins.com/search/Japanese-Movie/')">Japan</button>
            <button class="btn-link" onclick="launch('https://www.wetsins.com/search/sleeping-sister/')">Sister</button>
            <button class="btn-link" onclick="launch('https://www.jennymovies.com/japanese/')">Japense</button>
            <button class="btn-link" onclick="launch('https://www.jennymovies.com/')">Jenny</button>
            <button class="btn-link" onclick="launch('https://www.jennymovies.com/search/mom-share-bed/')">Share Bed</button>
            <button class="btn-link" onclick="launch('https://www.jennymovies.com/sites/public-agent/')">Oublic Agent</button>
             <button class="btn-link" onclick="launch('https://www.jennymovies.com/new/')">New</button>
         
            
        </div>
    </div>

    <div id="player">
        <div class="nav-bar">
            <button onclick="window.history.back()">← BACK</button>
            <button class="exit-btn" onclick="closePlayer()">✕ CLOSE PLAYER</button>
        </div>
        <div id="loader"></div>
        <div class="frame-wrapper">
            <iframe id="frame" allow="autoplay; encrypted-media; fullscreen; picture-in-picture; clipboard-write" sandbox="allow-forms allow-scripts allow-same-origin allow-popups allow-popups-to-escape-sandbox allow-presentation" allowfullscreen></iframe>
        </div>
    </div>

   <script>
    // --- CONFIGURATION ---
    const PROXY_BASE = "https://iframe.godess.workers.dev/?url=";
    const frame = document.getElementById('frame');
    const loader = document.getElementById('loader');
    const menu = document.getElementById('menu');
    const player = document.getElementById('player');
    let currentBlobUrl = null;

    /**
     * CORE LAUNCHER: 
     * 1. Fetches HTML in background
     * 2. Extracts direct .mp4 if possible
     * 3. Plays in custom player OR falls back to proxy
     */
    async function launch(target, isHistoryAction = false) {
        if (!target || target.startsWith('javascript:')) return;
        if (!target.startsWith('http')) target = 'https://' + target;

        // UI Feedback
        loader.style.display = 'block';
        menu.style.display = 'none';
        player.style.display = 'block';

        if (!isHistoryAction) {
            history.pushState({ url: target }, "", "?view=" + btoa(target));
        }

        try {
            // 1. SILENT FETCH: Get page content via Proxy
            const response = await fetch(PROXY_BASE + encodeURIComponent(target));
            const html = await response.text();
            
            // 2. TARGETED EXTRACTION (Regex for .nativeVideo and high-token MP4s)
            const videoMatch = html.match(/class=["']nativeVideo["'][^>]*src=["']([^"']+)["']/i) || 
                               html.match(/src=["']([^"']+\.mp4\?ahk=[^"']+)["']/i) ||
                               html.match(/<video[^>]*src=["']([^"']+)["']/i);
                               
            const posterMatch = html.match(/poster=["']([^"']+)["']/i);

            if (videoMatch && videoMatch[1]) {
                const rawVideoUrl = videoMatch[1];
                const posterUrl = posterMatch ? posterMatch[1] : '';

                // 3. BUILD CLEAN PLAYER (No Ads, No JS, Just Video)
                const cleanPlayerHtml = `
                    <html>
                    <head><meta name="viewport" content="width=device-width, initial-scale=1"></head>
                    <body style="margin:0;background:#000;display:flex;align-items:center;justify-content:center;height:100vh;overflow:hidden;">
                        <video id="v" controls playsinline poster="${posterUrl}" style="width:100%;height:100%;object-fit:contain;">
                            <source src="${PROXY_BASE + encodeURIComponent(rawVideoUrl)}" type="video/mp4">
                        </video>
                        <script>
                            const v = document.getElementById('v');
                            const playVideo = () => v.play().catch(() => {});
                            window.onload = playVideo;
                            document.body.onclick = () => v.play();
                        <\/script>
                    </body>
                    </html>
                `;
                
                // Cleanup memory
                if (currentBlobUrl) URL.revokeObjectURL(currentBlobUrl);
                const blob = new Blob([cleanPlayerHtml], { type: 'text/html' });
                currentBlobUrl = URL.createObjectURL(blob);
                frame.src = currentBlobUrl;
            } else {
                // FALLBACK: Load the proxied site if no direct MP4 is found
                frame.src = PROXY_BASE + encodeURIComponent(target);
            }
        } catch (e) {
            console.error("Bypass Error:", e);
            frame.src = PROXY_BASE + encodeURIComponent(target);
        }
    }

    // --- RECURSIVE HIJACKING ---
    
    // Listen for 'NAVIGATE' messages sent from the Cloudflare Worker script
    window.addEventListener('message', (e) => {
        if (e.data && e.data.type === 'NAVIGATE') {
            launch(e.data.url);
        }
    });

    frame.onload = () => {
        loader.style.display = 'none';
        
        try {
            const win = frame.contentWindow;
            const doc = win.document;

            // HIJACK CLICKS (Capture Phase): Stop site scripts from opening new tabs
            win.addEventListener('click', (e) => {
                const a = e.target.closest('a');
                if (a && a.href && !a.href.startsWith('javascript:')) {
                    // Kill the original event
                    e.preventDefault();
                    e.stopPropagation();
                    e.stopImmediatePropagation();
                    
                    // Route through our custom launcher
                    launch(a.href);
                }
            }, true);

            // HIJACK WINDOW.OPEN (Inside Frame)
            win.open = (url) => {
                launch(url);
                return null;
            };

            // AUTO-DETECT: If the page already has a video, grab it
            const v = doc.querySelector('.nativeVideo');
            if (v && v.src && !frame.src.startsWith('blob:')) {
                launch(v.src);
            }

        } catch (e) {
            // Fails gracefully if cross-origin policy is triggered
        }
    };

    // --- UTILITIES ---

    function launchCustom() {
        const val = document.getElementById('url-in').value.trim();
        if (val) launch(val);
    }

    function closePlayer() {
        if (currentBlobUrl) URL.revokeObjectURL(currentBlobUrl);
        frame.src = "about:blank";
        player.style.display = 'none';
        menu.style.display = 'flex';
        menu.style.opacity = '1';
        history.pushState(null, "", window.location.pathname);
    }

    // Back Button Support
    window.onpopstate = (e) => {
        if (e.state && e.state.url) launch(e.state.url, true);
        else closePlayer();
    };

    // URL Param Support (?view=base64url)
    window.onload = () => {
        const params = new URLSearchParams(window.location.search);
        const view = params.get('view');
        if (view) {
            try { launch(atob(view)); } catch(e) { launch(decodeURIComponent(view)); }
        }
    };
</script>
</body>
</html>
